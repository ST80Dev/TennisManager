// BRACKET TRANSITION — animazione avanzamento tabellone post-match
// ═══════════════════════════════════════════════════
function RecoveryPackPanel({fatNow, totalEntryCost, patrimonio, ttype, tt2color, onEnter, onCancel}){
  const PACKS=[
    {id:1,icon:"🥤",label:"Bibita",fat:10,cost:{ChallengerB:600,ChallengerA:1000,ATP250:2000,ATP500:3500,M1000:6000,Slam:10000}},
    {id:2,icon:"💆",label:"Massaggio",fat:20,cost:{ChallengerB:1400,ChallengerA:2200,ATP250:4500,ATP500:8000,M1000:14000,Slam:22000}},
    {id:3,icon:"🏥",label:"Fisioterapia",fat:30,cost:{ChallengerB:2500,ChallengerA:4000,ATP250:9000,ATP500:16000,M1000:28000,Slam:45000}},
    {id:4,icon:"⚡",label:"Spa Day",fat:40,cost:{ChallengerB:4000,ChallengerA:6500,ATP250:15000,ATP500:26000,M1000:45000,Slam:72000}},
  ];
  const[selPack,setSelPack]=React.useState(null);
  const pack=PACKS.find(p=>p.id===selPack)||null;
  const packFatVal=pack?pack.fat:0;
  const packCostVal=pack?(pack.cost[ttype]||pack.cost.ATP250):0;
  const fatAfterPack=Math.max(0,fatNow-packFatVal);
  const totalWithPack=totalEntryCost+packCostVal;
  const afterBalance=patrimonio-totalWithPack;
  return(
    <div style={{padding:"12px 18px 14px"}}>
      {/* Barra fatica con preview pack */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:5}}>
          <span style={{color:"#64748b",fontWeight:600}}>Fatica</span>
          <span style={{fontWeight:800,fontSize:15,fontFamily:"'Rajdhani',sans-serif",
            color:fatNow>70?"#ef4444":fatNow>40?"#f59e0b":"#10b981"}}>
            {packFatVal>0?<><span style={{textDecoration:"line-through",opacity:0.5,fontSize:13}}>{fatNow}%</span>{" → "}<span style={{color:"#38bdf8"}}>{fatAfterPack}%</span></>:<>{fatNow}%</>}
          </span>
        </div>
        <div style={{height:6,background:"#0a1628",borderRadius:3,overflow:"hidden",position:"relative"}}>
          <div style={{height:"100%",width:`${fatNow}%`,background:fatNow>70?"#ef4444":fatNow>40?"#f59e0b":"#10b981",borderRadius:3,transition:"width 0.4s",opacity:packFatVal>0?0.35:1}}/>
          {packFatVal>0&&<div style={{position:"absolute",top:0,left:0,height:"100%",width:`${fatAfterPack}%`,background:"#38bdf8",borderRadius:3,transition:"width 0.3s"}}/>}
        </div>
      </div>
      {/* Recovery pack selector — 4 bottoni compatti */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:10}}>
        {PACKS.map(pk=>{
          const pkCost=pk.cost[ttype]||pk.cost.ATP250;
          const isActive=selPack===pk.id;
          const canAfford=patrimonio>=totalEntryCost+pkCost;
          return(
            <button key={pk.id} onClick={()=>setSelPack(isActive?null:pk.id)}
              disabled={!canAfford}
              style={{background:isActive?"rgba(56,189,248,0.18)":"rgba(255,255,255,0.03)",
                border:`1.5px solid ${isActive?"#38bdf8":canAfford?"#1e3a5f":"#0d1f3c"}`,
                borderRadius:8,padding:"6px 3px",cursor:canAfford?"pointer":"not-allowed",
                opacity:canAfford?1:0.4,textAlign:"center",transition:"all 0.15s"}}>
              <div style={{fontSize:16,lineHeight:1,marginBottom:2}}>{pk.icon}</div>
              <div style={{fontSize:10,fontWeight:800,color:isActive?"#38bdf8":"#94a3b8",letterSpacing:0.3,lineHeight:1.2}}>{pk.label}</div>
              <div style={{fontSize:11,fontWeight:900,color:"#10b981",fontFamily:"'Rajdhani',sans-serif",marginTop:1}}>−{pk.fat}%</div>
              <div style={{fontSize:10,fontWeight:700,color:isActive?"#38bdf8":"#64748b",fontFamily:"'Rajdhani',sans-serif"}}>−€{fmt(pkCost)}</div>
            </button>
          );
        })}
      </div>
      {/* Totale aggiornato */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
        background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"7px 10px",marginBottom:10,
        border:`1px solid ${packCostVal>0?"#38bdf844":"#1e3a5f"}`}}>
        <span style={{fontSize:13,color:"#94a3b8",fontWeight:700}}>Totale immediato</span>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:17,fontWeight:900,fontFamily:"'Rajdhani',sans-serif",
            color:afterBalance<0?"#ef4444":"#e2e8f0"}}>
            −€{fmt(totalWithPack)}
          </div>
          <div style={{fontSize:11,color:afterBalance<0?"#ef4444":afterBalance<1000?"#f59e0b":"#475569",fontWeight:700}}>
            dopo: €{fmt(afterBalance)}
          </div>
        </div>
      </div>
      {/* Bottoni finali */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={()=>onEnter(packFatVal,packCostVal)}
          disabled={afterBalance<0}
          style={{background:afterBalance<0?"#1e293b":`linear-gradient(90deg,${tt2color},${tt2color}cc)`,
            border:"none",borderRadius:10,padding:"14px 16px",color:"#fff",fontWeight:800,fontSize:16,
            cursor:afterBalance<0?"not-allowed":"pointer",display:"flex",justifyContent:"space-between",
            alignItems:"center",boxShadow:afterBalance>=0?`0 4px 16px ${tt2color}44`:"none",
            opacity:afterBalance<0?0.5:1}}>
          <span>▶ Entra nel torneo</span>
          <span style={{fontSize:13,fontWeight:700,opacity:0.90,background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"3px 10px"}}>−€{fmt(totalWithPack)}</span>
        </button>
        <button onClick={onCancel}
          style={{background:"transparent",border:"1px solid #1e3a5f",borderRadius:10,padding:"11px 0",color:"#4e6680",fontSize:14,cursor:"pointer",fontWeight:600}}>
          ✕ Annulla
        </button>
      </div>
    </div>
  );
}

function BracketTransition({bracket, playerName, round, totalRounds, won, oppName, oppRank, oppNat}){
  // Fasi: 0=compare, 1=barra perdente, 2=vincitore avanza, 3=prossimo avversario, 4=done
  const[phase,setPhase]=React.useState(0);
  React.useEffect(()=>{
    const t1=setTimeout(()=>setPhase(1),350);
    const t2=setTimeout(()=>setPhase(2),950);
    const t3=setTimeout(()=>setPhase(3),1600);
    const t4=setTimeout(()=>setPhase(4),2600);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);clearTimeout(t4);};
  },[]);

  // Estrai avversario del prossimo turno dal bracket se disponibile
  const nextRound=bracket?.rounds?.[round+1];
  const nextMatch=nextRound?.matches?.find(m=>m.p1===playerName||m.p2===playerName);
  const nextOpp=nextMatch?(nextMatch.p1===playerName?{name:nextMatch.p2,rank:nextMatch.p2r}:{name:nextMatch.p1,rank:nextMatch.p1r}):null;
  const isLastRound=round+1>=totalRounds;

  const loser=won?{name:oppName,rank:oppRank,nat:oppNat}:{name:playerName,rank:null,nat:null,isPlayer:true};
  const winner=won?{name:playerName,rank:null,nat:null,isPlayer:true}:{name:oppName,rank:oppRank,nat:oppNat};

  const roundName=(r,tot)=>{
    const fe=tot-1-r;
    return fe===0?"Finale":fe===1?"Semifinale":fe===2?"Quarti di Finale":fe===3?"Ottavi di Finale":`Turno ${r+1}`;
  };
  const curRoundName=roundName(round,totalRounds);
  const nextRoundName=!isLastRound?roundName(round+1,totalRounds):null;

  // Colori
  const winCol="#10b981"; const loseCol="#ef4444"; const pendCol="#f59e0b";

  return(
    <div style={{
      background:"rgba(4,10,20,0.97)",
      border:"1px solid #1e3a5f",
      borderRadius:14,
      padding:"14px 16px",
      marginBottom:10,
      overflow:"hidden",
      position:"relative"
    }}>
      {/* Label turno */}
      <div style={{fontSize:10,fontWeight:800,color:"#475569",letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>
        {curRoundName}
      </div>

      {/* Layout: colonna turno corrente + freccia + colonna turno successivo */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>

        {/* Colonna sinistra: match appena giocato */}
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>

          {/* Slot vincitore */}
          <div style={{
            background:won?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.10)",
            border:`1.5px solid ${won?winCol+"55":loseCol+"44"}`,
            borderRadius:8,padding:"7px 10px",
            display:"flex",alignItems:"center",gap:6,
            transition:"all 0.4s ease",
            transform: phase>=2?"translateX(2px)":"translateX(0)",
          }}>
            {winner.isPlayer&&<span style={{fontSize:11,color:"#60a5fa"}}>👤</span>}
            <span style={{
              fontSize:13,fontWeight:800,
              color: phase>=1?(won?"#10b981":"#f87171"):"#e2e8f0",
              flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
            }}>
              {winner.nat&&!winner.isPlayer?winner.nat+" ":""}{winner.name}
            </span>
            <span style={{fontSize:10,color:won?winCol:loseCol,fontWeight:800}}>
              {phase>=1?(won?"✓":"✗"):""}
            </span>
          </div>

          {/* Separatore "vs" */}
          <div style={{textAlign:"center",fontSize:10,color:"#334155",fontWeight:700,lineHeight:1}}>VS</div>

          {/* Slot perdente — con barra animata */}
          <div style={{
            background:"rgba(255,255,255,0.03)",
            border:"1.5px solid #1e293b",
            borderRadius:8,padding:"7px 10px",
            display:"flex",alignItems:"center",gap:6,
            position:"relative",overflow:"hidden",
            opacity: phase>=1?0.5:1,
            transition:"opacity 0.5s ease"
          }}>
            {loser.isPlayer&&<span style={{fontSize:11,color:"#60a5fa"}}>👤</span>}
            <span style={{
              fontSize:13,fontWeight:phase>=1?500:800,
              color:"#64748b",
              flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
              textDecoration: phase>=1?"line-through":"none",
              transition:"all 0.5s ease"
            }}>
              {loser.nat&&!loser.isPlayer?loser.nat+" ":""}{loser.name}
            </span>
            {/* Barra rossa che si disegna sopra */}
            {phase>=1&&(
              <div style={{
                position:"absolute",top:"50%",left:8,right:8,height:2,
                background:"#ef4444",opacity:0.6,borderRadius:1,
                transformOrigin:"left",
                animation:"bracketStrike 0.45s ease-out forwards"
              }}/>
            )}
          </div>
        </div>

        {/* Freccia centrale */}
        <div style={{
          display:"flex",flexDirection:"column",alignItems:"center",
          opacity: phase>=2?1:0,
          transition:"opacity 0.4s ease",
          flexShrink:0,width:24
        }}>
          <div style={{fontSize:18,color:won?winCol:"#334155",fontWeight:900,lineHeight:1}}>→</div>
        </div>

        {/* Colonna destra: prossimo turno */}
        <div style={{
          flex:1,
          opacity: phase>=3?1:0,
          transform: phase>=3?"translateX(0)":"translateX(8px)",
          transition:"all 0.5s ease"
        }}>
          {isLastRound?(
            // Titolo vinto o eliminato in finale
            <div style={{
              background: won?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.03)",
              border:`1.5px solid ${won?"#f59e0b55":"#1e293b"}`,
              borderRadius:8,padding:"10px 10px",textAlign:"center"
            }}>
              <div style={{fontSize:20,marginBottom:3}}>{won?"🏆":"🎾"}</div>
              <div style={{fontSize:11,fontWeight:800,color:won?"#f59e0b":"#64748b"}}>
                {won?"CAMPIONE!":"Torneo concluso"}
              </div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <div style={{fontSize:10,fontWeight:800,color:"#334155",letterSpacing:1.2,textTransform:"uppercase",marginBottom:2}}>
                {nextRoundName}
              </div>
              {/* Slot giocatore nel prossimo turno */}
              <div style={{
                background: won?"rgba(16,185,129,0.08)":"rgba(255,255,255,0.02)",
                border:`1.5px solid ${won?"#10b98133":"#1e293b"}`,
                borderRadius:8,padding:"7px 10px",
                display:"flex",alignItems:"center",gap:6
              }}>
                <span style={{fontSize:11,color:"#60a5fa"}}>👤</span>
                <span style={{fontSize:13,fontWeight:800,color:won?"#e2e8f0":"#475569",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>
                  {won?playerName:"—"}
                </span>
              </div>
              {/* Slot avversario prossimo turno */}
              <div style={{
                background:"rgba(255,255,255,0.02)",
                border:"1.5px solid #1e3a5f",
                borderRadius:8,padding:"7px 10px",
                display:"flex",alignItems:"center",gap:6
              }}>
                {nextOpp?(
                  <>
                    <span style={{fontSize:13,color:"#94a3b8",flex:1,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {nextOpp.name}
                    </span>
                    {nextOpp.rank&&<span style={{fontSize:11,color:"#475569",flexShrink:0}}>#{nextOpp.rank}</span>}
                  </>
                ):(
                  <span style={{fontSize:13,color:"#334155",fontStyle:"italic",flex:1}}>
                    {won?"? In attesa...":"—"}
                  </span>
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* CSS keyframe inline per la barra strike */}
      <style>{`@keyframes bracketStrike{from{transform:scaleX(0)}to{transform:scaleX(1)}}`}</style>
    </div>
  );
}


// ═══════════════════════════════════════════════════
// DRAW SCREEN — sorteggio animato stile B
// ═══════════════════════════════════════════════════
function DrawScreen({bracket, playerName, playerNat, tourName, tourType, surface, tierColor, tierLabel, onContinue}){
  const tt2=TT[tourType]||TT.ATP250;
  const drawSize=Math.pow(2,tt2.rounds);
  const isLarge=drawSize>=64;

  // Estrai tutti i giocatori dal round 0 in ordine di slot
  const allPlayers=React.useMemo(()=>{
    if(!bracket?.rounds?.[0]?.matches) return [];
    const slots=new Array(drawSize).fill(null);
    bracket.rounds[0].matches.forEach((m,mi)=>{
      const p1slot=mi*2;
      const p2slot=mi*2+1;
      if(p1slot<drawSize) slots[p1slot]={name:m.p1,rank:m.p1r,nat:m.p1obj?.nat||"",isPlayer:m.p1obj?.isPlayer};
      if(p2slot<drawSize) slots[p2slot]={name:m.p2,rank:m.p2r,nat:m.p2obj?.nat||"",isPlayer:m.p2obj?.isPlayer};
    });
    return slots;
  },[bracket]);

  // Trova lo slot del giocatore
  const playerSlotIdx=allPlayers.findIndex(p=>p?.isPlayer);

  // Per draw grandi: mostra la sezione del giocatore (32 slot)
  const sectionSize=isLarge?32:drawSize;
  const sectionStart=isLarge?Math.floor(playerSlotIdx/sectionSize)*sectionSize:0;
  const sectionPlayers=allPlayers.slice(sectionStart,sectionStart+sectionSize);
  const playerLocalIdx=playerSlotIdx-sectionStart;

  // Identifica i seeded: i rank migliori nel draw
  const seedCount=drawSize===128?32:drawSize===64?16:drawSize===32?8:4;
  const sortedByRank=[...allPlayers].filter(Boolean).sort((a,b)=>(a.rank||500)-(b.rank||500));
  const seededNames=new Set(sortedByRank.slice(0,seedCount).map(p=>p.name));

  // ── Logica QF / SF corretta basata su struttura reale del draw ──
  // Il draw è diviso in quarti (drawSize/4 giocatori ciascuno)
  // Stesso quarto → QF | Stessa metà, quarto diverso → SF | Metà opposta → Finale
  const quarterSize=drawSize/4;
  const playerQuarter=Math.floor(playerSlotIdx/quarterSize); // 0,1,2,3
  const playerHalf=Math.floor(playerSlotIdx/(drawSize/2));   // 0 o 1

  // Testa di serie avversaria nel QF: la migliore testa di serie nello stesso quarto (escluso il giocatore)
  const possibleQF=(()=>{
    const qStart=playerQuarter*quarterSize;
    const qEnd=qStart+quarterSize;
    return allPlayers
      .slice(qStart,qEnd)
      .filter(p=>p&&!p.isPlayer&&seededNames.has(p.name))
      .sort((a,b)=>(a.rank||500)-(b.rank||500))[0]||null;
  })();

  // Testa di serie avversaria in SF: la migliore testa di serie nella stessa metà ma quarto diverso
  const possibleSF=(()=>{
    const halfStart=playerHalf*(drawSize/2);
    const halfEnd=halfStart+(drawSize/2);
    const qStart=playerQuarter*quarterSize;
    const qEnd=qStart+quarterSize;
    return allPlayers
      .slice(halfStart,halfEnd)
      .filter((p,i)=>{
        const absIdx=halfStart+i;
        return p&&!p.isPlayer&&seededNames.has(p.name)&&(absIdx<qStart||absIdx>=qEnd);
      })
      .sort((a,b)=>(a.rank||500)-(b.rank||500))[0]||null;
  })();

  // Testa di serie avversaria in Finale: la migliore dell'altra metà
  const possibleFinal=(()=>{
    const otherHalfStart=(playerHalf===0)?(drawSize/2):0;
    const otherHalfEnd=otherHalfStart+(drawSize/2);
    return allPlayers
      .slice(otherHalfStart,otherHalfEnd)
      .filter(p=>p&&!p.isPlayer&&seededNames.has(p.name))
      .sort((a,b)=>(a.rank||500)-(b.rank||500))[0]||null;
  })();

  // Fase animazione: quanti slot sono "rivelati"
  const totalSlots=sectionPlayers.length;
  const [revealed, setRevealed]=React.useState(0);
  const [done, setDone]=React.useState(false);
  const [skipped, setSkipped]=React.useState(false);

  React.useEffect(()=>{
    if(skipped){setRevealed(totalSlots);setDone(true);return;}
    if(revealed>=totalSlots){setDone(true);return;}
    const nextSlot=sectionPlayers[revealed];
    const isSeeded=nextSlot&&seededNames.has(nextSlot.name);
    // Seeded: 220ms, non-seeded: 110ms — ritmo più lento e cinematico
    const delay=isSeeded?220:110;
    const t=setTimeout(()=>setRevealed(r=>r+1),delay);
    return()=>clearTimeout(t);
  },[revealed,skipped,totalSlots]);

  // Avversario T1
  const playerMatch=bracket?.rounds?.[0]?.matches?.find(m=>m.isPlayerMatch);
  const oppT1=playerMatch?(playerMatch.p1obj?.isPlayer?{name:playerMatch.p2,rank:playerMatch.p2r,nat:playerMatch.p2obj?.nat||""}:{name:playerMatch.p1,rank:playerMatch.p1r,nat:playerMatch.p1obj?.nat||""}):null;

  const surfEmoji={"Cemento":"🏟️","Terra Rossa":"🔴","Erba":"💚"}[surface]||"🎾";
  const getNatFlag=nat=>nat||"";

  // Numero round del torneo per calcolare SF label corretto
  // In tornei piccoli (Challenger 5 round) non c'è QF
  const hasQF=tt2.rounds>=6; // ATP250+ hanno QF; Challenger (5 round) ha solo SF
  const hasSF=tt2.rounds>=5;

  return(
    <div style={{height:"100vh",background:"#050e1a",color:"#fff",maxWidth:520,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header torneo */}
      <div style={{background:"linear-gradient(135deg,#0a1628,#0d1f3a)",borderBottom:`2px solid ${tierColor}44`,padding:"18px 18px 14px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <div style={{width:4,height:36,background:tierColor,borderRadius:2,flexShrink:0}}/>
          <div>
            <div style={{fontSize:11,fontWeight:800,color:tierColor,letterSpacing:2,textTransform:"uppercase"}}>{tierLabel}</div>
            <div style={{fontSize:20,fontWeight:900,color:"#f1f5f9",letterSpacing:0.3}}>{tourName}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,marginTop:4}}>
          <span style={{fontSize:12,color:"#64748b"}}>{surfEmoji} {surface}</span>
          <span style={{fontSize:12,color:"#64748b"}}>Draw {drawSize}</span>
          {isLarge&&<span style={{fontSize:11,color:"#475569",fontStyle:"italic"}}>sezione del giocatore</span>}
        </div>
      </div>

      {/* Titolo sorteggio */}
      <div style={{padding:"12px 18px 6px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:900,color:"#94a3b8",letterSpacing:1.5,textTransform:"uppercase"}}>
            {done?"Sorteggio completato":"Sorteggio in corso..."}
          </div>
        </div>
        {!done&&(
          <div style={{display:"flex",gap:3}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{width:5,height:5,borderRadius:"50%",background:tierColor,
                animation:`drawPulse 1.2s ease-in-out ${i*0.2}s infinite alternate`}}/>
            ))}
          </div>
        )}
      </div>

      {/* Tabellone scorrevole — area flex che cresce */}
      <div style={{flex:1,overflowY:"auto",padding:"0 18px 8px"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {sectionPlayers.map((p,i)=>{
            const isVisible=i<revealed;
            const isPlayerSlot=i===playerLocalIdx;
            const isOppSlot=oppT1&&p&&p.name===oppT1.name;
            const isSeededP=p&&seededNames.has(p.name);
            const seedPos=isSeededP?sortedByRank.findIndex(s=>s.name===p?.name)+1:null;
            const isMatchStart=i%2===0;
            return(
              <React.Fragment key={i}>
                {isMatchStart&&i>0&&<div style={{height:4}}/>}
                <div style={{
                  display:"flex",alignItems:"center",gap:8,
                  padding:"8px 10px",borderRadius:8,
                  background:isPlayerSlot
                    ?"rgba(59,130,246,0.18)"
                    :isOppSlot
                      ?"rgba(239,68,68,0.12)"
                      :"rgba(255,255,255,0.03)",
                  border:`1.5px solid ${isPlayerSlot?"#3b82f688":isOppSlot?"#ef444455":"transparent"}`,
                  opacity:isVisible?1:0,
                  transform:isVisible?"translateX(0)":"translateX(-14px)",
                  transition:"opacity 0.3s ease, transform 0.3s ease",
                  minHeight:36,
                }}>
                  <span style={{fontSize:10,color:"#334155",fontWeight:700,minWidth:22,textAlign:"right",fontFamily:"'Rajdhani',sans-serif"}}>
                    {isVisible?(sectionStart+i+1):""}
                  </span>
                  {isVisible&&isSeededP&&seedPos<=seedCount&&(
                    <span style={{fontSize:9,fontWeight:900,color:tierColor,background:`${tierColor}22`,
                      borderRadius:4,padding:"1px 4px",flexShrink:0,letterSpacing:0.5}}>
                      [{seedPos}]
                    </span>
                  )}
                  <span style={{flex:1,fontSize:13,fontWeight:isPlayerSlot?900:isSeededP?700:500,
                    color:isPlayerSlot?"#93c5fd":isOppSlot?"#fca5a5":"#e2e8f0",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {isVisible&&p?(
                      <>
                        {(isPlayerSlot?playerNat:p.nat)&&<span style={{marginRight:4}}>{isPlayerSlot?playerNat:getNatFlag(p.nat)}</span>}
                        {p.name}
                        {isPlayerSlot&&<span style={{fontSize:10,color:"#60a5fa",marginLeft:6}}>← TU</span>}
                      </>
                    ):""}
                  </span>
                  {isVisible&&p?.rank&&(
                    <span style={{fontSize:13,color:isPlayerSlot?"#93c5fd":isSeededP?"#c4b5fd":"#94a3b8",
                      fontFamily:"'Rajdhani',sans-serif",fontWeight:800,flexShrink:0}}>
                      #{p.rank}
                    </span>
                  )}
                  {isVisible&&i%2===1&&(
                    <span style={{fontSize:9,color:"#1e3a5f",fontWeight:800,marginLeft:2}}>VS</span>
                  )}
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>

      {/* ── FOOTER FISSO ── info + pulsanti sempre visibili */}
      <div style={{background:"#070f1d",borderTop:"1px solid #1e293b",padding:"12px 18px",flexShrink:0}}>

        {/* Info avversario T1 + proiezioni — visibili solo a sorteggio completato */}
        {done&&(
          <div style={{marginBottom:10}}>
            {/* Primo turno */}
            {oppT1&&(
              <div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(239,68,68,0.10)",
                border:"1px solid #ef444433",borderRadius:10,padding:"9px 12px",marginBottom:8}}>
                <span style={{fontSize:16}}>🎾</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#ef4444",fontWeight:700,marginBottom:2}}>Primo Turno</div>
                  <div style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>
                    {getNatFlag(oppT1.nat)&&<span style={{marginRight:4}}>{getNatFlag(oppT1.nat)}</span>}
                    {oppT1.name}
                    <span style={{fontSize:12,color:"#64748b",fontFamily:"'Rajdhani',sans-serif",marginLeft:6}}>#{oppT1.rank}</span>
                  </div>
                </div>
              </div>
            )}
            {/* QF e SF possibili — riga compatta */}
            {(possibleQF||possibleSF)&&(
              <div style={{display:"flex",gap:6,marginBottom:2}}>
                {hasQF&&possibleQF&&(
                  <div style={{flex:1,background:"rgba(139,92,246,0.08)",border:"1px solid #8b5cf622",
                    borderRadius:8,padding:"7px 10px"}}>
                    <div style={{fontSize:10,color:"#8b5cf6",fontWeight:800,marginBottom:3}}>Pos. QF</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#cbd5e1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {getNatFlag(possibleQF.nat)&&<span style={{marginRight:3}}>{getNatFlag(possibleQF.nat)}</span>}
                      {possibleQF.name}
                    </div>
                    <div style={{fontSize:11,color:"#475569",fontFamily:"'Rajdhani',sans-serif"}}>#{possibleQF.rank}</div>
                  </div>
                )}
                {hasSF&&possibleSF&&(
                  <div style={{flex:1,background:"rgba(245,158,11,0.08)",border:"1px solid #f59e0b22",
                    borderRadius:8,padding:"7px 10px"}}>
                    <div style={{fontSize:10,color:"#f59e0b",fontWeight:800,marginBottom:3}}>Pos. SF</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#cbd5e1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {getNatFlag(possibleSF.nat)&&<span style={{marginRight:3}}>{getNatFlag(possibleSF.nat)}</span>}
                      {possibleSF.name}
                    </div>
                    <div style={{fontSize:11,color:"#475569",fontFamily:"'Rajdhani',sans-serif"}}>#{possibleSF.rank}</div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* Pulsanti — sempre visibili */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setSkipped(true)}
            style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid #1e293b",
              borderRadius:10,padding:"11px 0",color:"#64748b",fontWeight:700,fontSize:14,cursor:"pointer"}}>
            Salta →
          </button>
          {done&&(
            <button onClick={onContinue}
              style={{flex:2,background:`linear-gradient(90deg,${tierColor},${tierColor}bb)`,
                border:"none",borderRadius:10,padding:"13px 0",
                color:"#fff",fontWeight:900,fontSize:15,cursor:"pointer",letterSpacing:0.3}}>
              Al primo turno →
            </button>
          )}
        </div>
      </div>

      <style>{`
        @keyframes drawPulse{from{opacity:0.4;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
      `}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// BRACKET UPDATE SCREEN — tabellone aggiornato post-match
// ═══════════════════════════════════════════════════
function BracketUpdateScreen({bracket, playerName, completedRound, totalRounds, won, isExit, isTournEnd, tourName, tourType, tierColor, tierLabel, onContinue}){
  const [visible, setVisible]=React.useState(false);
  React.useEffect(()=>{const t=setTimeout(()=>setVisible(true),80);return()=>clearTimeout(t);},[]);

  const tt2=TT[tourType]||TT.ATP250;
  const drawSize=Math.pow(2,tt2.rounds);
  const isLarge=drawSize>=64;

  // Recupera match player dal round completato
  const completedMatchData=bracket?.rounds?.[completedRound]?.matches?.find(m=>m.isPlayerMatch||m.p1===playerName||m.p2===playerName);

  // Recupera tutti i match del round completato visibili nella sezione
  const allRounds=bracket?.rounds||[];

  // Trova il nome del vincitore del prossimo match del giocatore
  const nextRoundData=!isTournEnd&&allRounds[completedRound+1];
  const nextPlayerMatch=nextRoundData&&nextRoundData.matches?.find(m=>m.p1===playerName||m.p2===playerName);
  const nextOpp=nextPlayerMatch?(nextPlayerMatch.p1===playerName?{name:nextPlayerMatch.p2,rank:nextPlayerMatch.p2r,nat:nextPlayerMatch.p2obj?.nat||""}:{name:nextPlayerMatch.p1,rank:nextPlayerMatch.p1r,nat:nextPlayerMatch.p1obj?.nat||""}):null;

  const roundName=(r,tot)=>{
    const fe=tot-1-r;
    return fe===0?"Finale":fe===1?"Semifinale":fe===2?"Quarti di Finale":fe===3?"Ottavi di Finale":`Turno ${r+1}`;
  };
  const curRoundLabel=roundName(completedRound,totalRounds);
  const nextRoundLabel=!isTournEnd?roundName(completedRound+1,totalRounds):null;

  // Mostra i match del round completato — max 8 per non sovraccaricare
  const roundMatches=(allRounds[completedRound]?.matches||[]).slice(0,8);
  const getNatFlag=nat=>nat||"";

  const winCol="#10b981"; const loseCol="#ef4444"; const pendCol="#60a5fa";

  return(
    <div style={{minHeight:"100vh",background:"#050e1a",color:"#fff",maxWidth:520,margin:"0 auto",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0a1628,#0d1f3a)",borderBottom:`2px solid ${tierColor}44`,padding:"16px 18px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:4,height:32,background:tierColor,borderRadius:2,flexShrink:0}}/>
          <div>
            <div style={{fontSize:11,fontWeight:800,color:tierColor,letterSpacing:2,textTransform:"uppercase"}}>{tierLabel}</div>
            <div style={{fontSize:18,fontWeight:900,color:"#f1f5f9"}}>{tourName}</div>
          </div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:11,color:"#475569",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Tabellone</div>
            <div style={{fontSize:13,fontWeight:800,color:"#94a3b8"}}>{curRoundLabel}</div>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"14px 18px 8px"}}>

        {/* Risultati del round completato */}
        <div style={{fontSize:11,fontWeight:800,color:"#334155",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>
          Risultati {curRoundLabel}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:16,
          opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(8px)",transition:"all 0.35s ease"}}>
          {roundMatches.map((m,i)=>{
            const isPlayerMatch2=m.p1===playerName||m.p2===playerName;
            const winner=m.winner;
            const p1won=winner===m.p1;
            const p2won=winner===m.p2;
            return(
              <div key={i} style={{
                background:isPlayerMatch2?"rgba(59,130,246,0.08)":"rgba(255,255,255,0.02)",
                border:`1px solid ${isPlayerMatch2?"#3b82f633":"#1e293b"}`,
                borderRadius:8,padding:"8px 10px",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {/* P1 */}
                  <span style={{flex:1,fontSize:12,fontWeight:m.p1===playerName?800:500,
                    color:p1won?"#e2e8f0":"#475569",
                    textDecoration:!p1won&&winner?"line-through":"none",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {getNatFlag(m.p1obj?.nat)&&<span style={{marginRight:3}}>{getNatFlag(m.p1obj?.nat)}</span>}
                    {m.p1}
                    {m.p1===playerName&&<span style={{fontSize:10,color:"#60a5fa",marginLeft:4}}>👤</span>}
                  </span>
                  <span style={{fontSize:10,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,
                    color:p1won?winCol:"#334155",minWidth:14,textAlign:"center"}}>
                    {p1won&&winner?"✓":winner?"✗":""}
                  </span>
                  <span style={{fontSize:10,color:"#1e3a5f",fontWeight:800,padding:"0 4px"}}>VS</span>
                  <span style={{fontSize:10,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,
                    color:p2won?winCol:"#334155",minWidth:14,textAlign:"center"}}>
                    {p2won&&winner?"✓":winner?"✗":""}
                  </span>
                  {/* P2 */}
                  <span style={{flex:1,fontSize:12,fontWeight:m.p2===playerName?800:500,
                    color:p2won?"#e2e8f0":"#475569",
                    textDecoration:!p2won&&winner?"line-through":"none",
                    textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {m.p2}
                    {m.p2===playerName&&<span style={{fontSize:10,color:"#60a5fa",marginLeft:4}}>👤</span>}
                    {m.p2obj?.nat&&<span style={{marginLeft:3}}>{getNatFlag(m.p2obj?.nat)}</span>}
                  </span>
                </div>
                {/* Rank riga sotto */}
                <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                  <span style={{fontSize:10,color:"#334155",fontFamily:"'Rajdhani',sans-serif"}}>#{m.p1r}</span>
                  <span style={{fontSize:10,color:"#334155",fontFamily:"'Rajdhani',sans-serif"}}>#{m.p2r}</span>
                </div>
              </div>
            );
          })}
          {(allRounds[completedRound]?.matches||[]).length>8&&(
            <div style={{fontSize:11,color:"#334155",textAlign:"center",fontStyle:"italic",padding:"4px 0"}}>
              +{(allRounds[completedRound]?.matches||[]).length-8} altri match
            </div>
          )}
        </div>

        {/* Prossimo turno o fine torneo */}
        {!isTournEnd&&nextOpp&&(
          <div style={{opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(8px)",
            transition:"all 0.35s ease 0.15s"}}>
            <div style={{fontSize:11,fontWeight:800,color:"#334155",letterSpacing:1.5,
              textTransform:"uppercase",marginBottom:8}}>
              {nextRoundLabel}
            </div>
            <div style={{background:"rgba(16,185,129,0.08)",border:"1px solid #10b98133",
              borderRadius:10,padding:"12px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#10b981",fontWeight:700,marginBottom:4}}>Il tuo prossimo match</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <span style={{fontSize:10,color:"#60a5fa"}}>👤</span>
                    <span style={{fontSize:14,fontWeight:900,color:"#e2e8f0"}}>{playerName}</span>
                  </div>
                  <div style={{fontSize:12,color:"#475569",fontWeight:600,marginBottom:4}}>VS</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14,fontWeight:700,color:"#cbd5e1"}}>
                      {getNatFlag(nextOpp.nat)&&<span style={{marginRight:4}}>{getNatFlag(nextOpp.nat)}</span>}
                      {nextOpp.name}
                    </span>
                    <span style={{fontSize:12,color:"#475569",fontFamily:"'Rajdhani',sans-serif",fontWeight:700}}>#{nextOpp.rank}</span>
                  </div>
                </div>
                <div style={{fontSize:32,opacity:0.6}}>🎾</div>
              </div>
            </div>
          </div>
        )}

        {/* Fine torneo */}
        {isTournEnd&&(
          <div style={{textAlign:"center",padding:"20px 0",
            opacity:visible?1:0,transition:"all 0.4s ease 0.1s"}}>
            <div style={{fontSize:48,marginBottom:10}}>{won?"🏆":"🎾"}</div>
            <div style={{fontSize:22,fontWeight:900,color:won?"#f59e0b":"#64748b",marginBottom:6}}>
              {won?"CAMPIONE!":"Torneo concluso"}
            </div>
            <div style={{fontSize:14,color:"#475569"}}>
              {won?`Hai vinto ${tourName}!`:`Eliminato al ${curRoundLabel}`}
            </div>
          </div>
        )}
      </div>

      {/* Footer pulsante */}
      <div style={{background:"#070f1d",borderTop:"1px solid #1e293b",padding:"14px 18px"}}>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onContinue}
            style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid #1e293b",
              borderRadius:10,padding:"11px 0",color:"#64748b",fontWeight:700,fontSize:14,cursor:"pointer"}}>
            Salta →
          </button>
          <button onClick={onContinue}
            style={{flex:2,background:isTournEnd?(won?"linear-gradient(90deg,#f59e0b,#d97706)":"#1e3a5f"):`linear-gradient(90deg,${tierColor},${tierColor}bb)`,
              border:"none",borderRadius:10,padding:"13px 0",
              color:"#fff",fontWeight:900,fontSize:15,cursor:"pointer",letterSpacing:0.3}}>
            {isTournEnd?(won?"Al calendario 🏆":"Al calendario →"):"Avanti →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// MATCH SCREEN — game per game
// ═══════════════════════════════════════════════════
function MatchScreen({md,player,staff,onFinish,morale,bracket,tourRound,activeEvents=[],year=1,week=1}){
  const{tourn,opp,bestOf,round}=md;
  const tt=TT[tourn.type]||TT.ATP250;
  const toWin=Math.ceil(bestOf/2);
  const surfCol=SURF_COL[tourn.surface]||"#4a90d9";

  const[sets,setSets]=useState([]);
  const[curPG,setCurPG]=useState(0);
  const[curOG,setCurOG]=useState(0);
  const[serving,setServing]=useState(Math.random()<0.5?"player":"opp");
  const[activeBonus,setActiveBonus]=useState({});
  const[bonusGamesLeft,setBonusGamesLeft]=useState(0);
  const[bonusServGamesLeft,setBonusServGamesLeft]=useState(0);
  const[hand]=useState(()=>[...BONUS_CARDS].sort(()=>Math.random()-0.5).slice(0,3));
  const[usedBonus,setUsedBonus]=useState([]);
  const[lastEvent,setLastEvent]=useState("");
  const[result,setResult]=useState(null);
  const[showBonusPanel,setShowBonusPanel]=useState(false);
  // Timer: secondi totali di partita simulati
  const[matchSecs,setMatchSecs]=useState(0);
  // Morale dinamico: parte dal morale reale, varia durante la partita
  const[liveMoreale,setLiveMoreale]=useState(md?.startMorale!=null?md.startMorale:(morale||50));
  const[domSetsWon,setDomSetsWon]=useState(0);
  const[finishCalled,setFinishCalled]=useState(false); // debounce bottone Continua
  const[showBracketAnim,setShowBracketAnim]=useState(false); // animazione bracket post-match
  const[domSetsLost,setDomSetsLost]=useState(0);
  // gameLog: traccia ogni game giocato per il tracker visivo
  // {serving:"player"|"opp", playerWon:bool, setIdx:number}
  // reset a ogni set (setIdx identifica il set)
  const[gameLog,setGameLog]=useState([]);
  // trackOffset: indice del primo set visibile nel tracker (finestra di 3)
  const[trackOffset,setTrackOffset]=useState(0);
  // Auto-avanza la finestra quando inizia un nuovo set oltre la terza colonna
  React.useEffect(()=>{
    const currentIdx=sets.length; // set in corso (0-based)
    const minOffset=Math.max(0,currentIdx-2);
    setTrackOffset(o=>Math.max(o,minOffset));
  },[sets.length]);
  // Win% teorica calcolata all'inizio del match — usata per morale upset
  const[startWinPct]=useState(()=>{
    const coachLvInit=getStaffLevel(staff,"coach");
    const coachMInit=coachLvInit?(coachLvInit.matchBonus||1.0):1.0;
    const pS0=pStr(player.stats,tourn.surface,{},md?.startMorale!=null?md.startMorale:(morale||50),player.fatigue||0,coachMInit,activeEvents||[]);
    const oS0=pStr(opp.stats,tourn.surface,{},50,0,1.0);
    return Math.round(winP(pS0,oS0)*100);
  });
  // pureWinPct: win% calcolata a morale=50 e fatica=0 — misura obiettiva del vantaggio tecnico
  // non influenzata dal morale corrente, usata come trigger upset in calcMoraleShift
  const[pureWinPct]=useState(()=>{
    const coachLvInit2=getStaffLevel(staff,"coach");
    const coachMInit2=coachLvInit2?(coachLvInit2.matchBonus||1.0):1.0;
    const pS0pure=pStr(player.stats,tourn.surface,{},50,0,coachMInit2,[]);
    const oS0pure=pStr(opp.stats,tourn.surface,{},50,0,1.0);
    return Math.round(winP(pS0pure,oS0pure)*100);
  });

  const avail=hand.filter(c=>!usedBonus.includes(c.id));
  window._playerMorale=liveMoreale;
  window._playerFatigue=player.fatigue||0;
  const pSets=sets.filter(s=>s.w).length;
  const oSets=sets.filter(s=>!s.w).length;
  const totalGames=sets.reduce((a,s)=>a+s.pg+s.og,0)+curPG+curOG;

  // Formatta secondi → "mm:ss"
  function fmtTime(s){const m=Math.floor(s/60);return `${String(m).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
  // Colore morale
  function moraleCol(m){return m>=70?"#10b981":m>=50?"#3b82f6":m>=30?"#f59e0b":"#ef4444";}
  function moraleLabel(m){return m>=70?"Eccellente":m>=50?"Buono":m>=30?"In calo":"Crisi";}

  function addLog(m){setLastEvent(m);}

  // Coach match bonus: 1.5/3/5% su pStr durante i match (lv 1/2/3)
  const coachLvMatch=getStaffLevel(staff,"coach");
  const coachMatchMult=coachLvMatch?(coachLvMatch.matchBonus||1.0):1.0;

  function applyStaffBonus(bonusMods){
    const mentalLv=getStaffLevel(staff,"mental");
    if(!mentalLv)return bonusMods;
    const b={};Object.entries(bonusMods).forEach(([k,v])=>{b[k]=Math.round(v*mentalLv.bonusBoost);});
    return b;
  }

  function activateBonus(card){
    const boosted=applyStaffBonus(card.b);
    setActiveBonus({...boosted,serviceOnly:card.serviceOnly||false});
    // Ace Boost serviceOnly: conta 2 game di SERVIZIO, non 3 game totali
    // bonusServGamesLeft usato in playGame per il conteggio servizi
    if(card.serviceOnly){
      setBonusGamesLeft(0); // non scala su tutti i game
      setBonusServGamesLeft(2);
    } else {
      setBonusGamesLeft(3);
      setBonusServGamesLeft(0);
    }
    setUsedBonus(u=>[...u,card.id]);
    addLog(`🃏 ${card.name} attivato!`);
    setShowBonusPanel(false);
  }

  function playGame(){
    // Ace Boost serviceOnly: attivo solo sui game di servizio del giocatore
    const isPlayerServe=serving==="player";
    const servBonusActive=bonusServGamesLeft>0&&isPlayerServe;
    const bonus=(bonusGamesLeft>0||servBonusActive)?activeBonus:{};
    const pS=pStr(player.stats,tourn.surface,bonus,liveMoreale,player.fatigue||0,coachMatchMult,activeEvents||[]);
    const oS=pStr(opp.stats,tourn.surface,{},50,0,1.0);
    const playerWins=isPlayerServe
      ? Math.random()<winP(pS*1.08,oS)
      : Math.random()<winP(pS,oS*1.08);
    const newPG=curPG+(playerWins?1:0);
    const newOG=curOG+(playerWins?0:1);
    // Scala contatori bonus
    if(bonusGamesLeft>0)setBonusGamesLeft(bg=>bg<=1?(setActiveBonus({}),setBonusServGamesLeft(0),0):bg-1);
    if(servBonusActive)setBonusServGamesLeft(sg=>sg<=1?(setActiveBonus({}),0):sg-1);
    setServing(s=>s==="player"?"opp":"player");
    // Aggiorna gameLog con il game appena giocato
    setGameLog(gl=>[...gl,{serving:isPlayerServe?"player":"opp",playerWon:playerWins,setIdx:sets.length}]);
    // Timer: ogni game dura 2-5 min simulati (120-300s)
    const gameSecs=120+Math.floor(Math.random()*180);
    setMatchSecs(s=>s+gameSecs);
    // Morale dinamico: varia leggermente ad ogni game
    setLiveMoreale(m=>{
      const delta=playerWins?(Math.random()<0.4?1:0):(Math.random()<0.4?-1:0);
      return Math.max(0,Math.min(100,m+delta));
    });
    addLog(`${playerWins?"✅":"❌"} Game ${newPG}-${newOG}${(bonusGamesLeft>0||servBonusActive)?" 🃏":""} ${isPlayerServe?"(tuo servizio)":"(serv. avv.)"}`);
    // Check set end
    const playerSetWin=(newPG>=6&&newPG-newOG>=2)||(newPG===7&&newOG===6);
    const oppSetWin=(newOG>=6&&newOG-newPG>=2)||(newOG===7&&newPG===6);
    if(playerSetWin||oppSetWin){
      const w=playerSetWin;
      const ns=[...sets,{w,pg:newPG,og:newOG}];
      setSets(ns);setCurPG(0);setCurOG(0);
      const np=ns.filter(s=>s.w).length,no=ns.filter(s=>!s.w).length;
      // Morale: variazione a fine set + bonus/malus set dominante
      const isDominant=w?(newPG===6&&newOG<=1):(newOG===6&&newPG<=1);
      const setMoraleDelta=w?(isDominant?5:3):(isDominant?-5:-3);
      setLiveMoreale(m=>Math.max(0,Math.min(100,m+setMoraleDelta)));
      if(isDominant){if(w){addLog(`🎾 Set ${np}-${no}: ${newPG}-${newOG} — DOMINATO 🔥`);setDomSetsWon(d=>d+1);}else{addLog(`🎾 Set ${np}-${no}: ${newPG}-${newOG} — ANNIENTATO 💔`);setDomSetsLost(d=>d+1);}}
      else{addLog(`🎾 Set ${np}-${no}: ${newPG}-${newOG} — ${w?"VINTO ✓":"PERSO ✗"}`);}

      if(np===toWin){setResult({won:true,ps:np,os:no});setShowBracketAnim(true);return;}
      if(no===toWin){setResult({won:false,ps:np,os:no});setShowBracketAnim(true);return;}
    } else {
      setCurPG(newPG);setCurOG(newOG);
    }
  }

  const pN=Object.fromEntries(STAT_KEYS.map(k=>[k,Math.round(player.stats[k]||0)]));
  const oN=Object.fromEntries(STAT_KEYS.map(k=>[k,Math.round(opp.stats[k]||0)]));

  // ── Dati per il tabellone TV-style ──────────────────────────────
  // Ogni colonna = un set completato; ultima colonna = set in corso
  const allSetCols=[...sets.map(s=>({pg:s.pg,og:s.og,done:true,w:s.w}))];
  if(!result) allSetCols.push({pg:curPG,og:curOG,done:false});

  // Colori campo per superficie
  const courtC = SURF_COURT[tourn.surface]||SURF_COURT["Cemento"];

  return(
    <div style={{minHeight:"100vh",background:"#080f1a",color:"#fff",maxWidth:500,margin:"0 auto",paddingBottom:20,fontFamily:"'DM Sans',sans-serif"}}>

      {/* 1. HEADER TORNEO */}
      <div style={{background:"linear-gradient(135deg,#0d1b2e,#0a1520)",borderBottom:`2px solid ${surfCol}66`,padding:"8px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:16,letterSpacing:0.5,color:"#f0f6ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{getTourFlag(tourn.name)} {tourn.name}</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginTop:3}}>
              <Badge label={tt.label} color={tt.color}/>
              <span style={{fontSize:11,color:surfCol,fontWeight:600}}>◉ {tourn.surface}</span>
            </div>
          </div>
          {/* Turno in evidenza */}
          {(()=>{
            const rn=getRoundName(round,md.totalRounds||4);
            const isBig=rn==="Finale"||rn==="Semifinale";
            const isMed=rn==="Quarti"||rn==="Ottavi";
            const rcol=isBig?"#f59e0b":isMed?"#a78bfa":"#64748b";
            const rbg=isBig?"rgba(245,158,11,0.15)":isMed?"rgba(167,139,250,0.12)":"rgba(100,116,139,0.10)";
            return(
              <div style={{background:rbg,border:`1px solid ${rcol}55`,borderRadius:8,padding:"4px 10px",textAlign:"center",flexShrink:0}}>
                <div style={{fontSize:isBig?15:13,fontWeight:900,color:rcol,fontFamily:"'Rajdhani',sans-serif",letterSpacing:0.5}}>{rn}</div>
                <div style={{fontSize:10,color:rcol,opacity:0.7,fontWeight:600}}>BO{bestOf}</div>
                {isBig&&<div style={{fontSize:10,color:"#f59e0b",marginTop:1}}>{"★".repeat(rn==="Finale"?3:2)}</div>}
              </div>
            );
          })()}
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{background:"#0f172a",borderRadius:6,padding:"3px 8px",fontSize:12,fontWeight:"bold",color:"#94a3b8",fontVariantNumeric:"tabular-nums",fontFamily:"'Rajdhani',sans-serif"}}>
              ⏱ {fmtTime(matchSecs)}
            </div>
          </div>
        </div>
        {/* ── Strip pts/prize: turno corrente → turno successivo ── */}
        {(()=>{
          const _tr=md.totalRounds||4;
          const _fe=_tr-1-round;
          const _type=tourn.type;
          const _ttPrize=(TT[_type]||TT.ATP250).prize;
          const _pmTbl=PRIZE_MONEY[_type]||[];
          const _pmSize=_pmTbl.length;
          const _hasNull=_pmSize>0&&_pmTbl[0]===null;
          const _isTitle=_fe===0;
          // pfIdx per sconfitta al round_ (uscita turno corrente)
          // Slam(8 slot,no null): pfIdx=round diretto
          // ITF/ChalA/B(null prefix): pfIdx=round+1
          // ATP250/500/Finals(7 slot,no null): pfIdx=round diretto
          function _pfIdxLose(r){
            if(_pmSize>7) return r;
            if(_hasNull) return r+1;
            return r;
          }
          // pfIdx per titolo: ultimo slot
          const _pfIdxTitle=_pmSize>0?_pmSize-1:6;
          // SE PERDI: uscita turno corrente
          const _ptsLose=getMatchPts(_type,_fe,false);
          const _przLose=getMatchMoney(_type,_ttPrize,_pfIdxLose(round));
          // SE VINCI: titolo oppure uscita turno successivo (round+1)
          const _ptsWin=_isTitle?getMatchPts(_type,0,true):getMatchPts(_type,_fe-1,false);
          const _przWin=_isTitle?getMatchMoney(_type,_ttPrize,_pfIdxTitle):getMatchMoney(_type,_ttPrize,_pfIdxLose(round+1));
          const _winCol=_isTitle?"#f59e0b":"#10b981";
          // Nota: Slam SF ha _przLose===_przWin (154k) — reale, non un bug
          return(
            <div style={{display:"flex",alignItems:"center",gap:0,marginTop:6,background:"rgba(0,0,0,0.28)",borderRadius:8,padding:"5px 10px",border:"1px solid #1a2d45"}}>
              <div style={{flex:1,textAlign:"left"}}>
                <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",marginBottom:2}}>SE PERDI</div>
                <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                  <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:800,color:"#64748b"}}>+{_ptsLose}<span style={{fontSize:10,fontWeight:600}}> pts</span></span>
                  <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:13,fontWeight:700,color:_przLose>0?"#64748b":"#2d3f52"}}>{_przLose>0?"€"+fmt(_przLose):"—"}</span>
                </div>
              </div>
              <div style={{fontSize:20,color:"#334155",flexShrink:0,margin:"0 6px",fontWeight:900}}>→</div>
              <div style={{flex:1,textAlign:"right"}}>
                <div style={{fontSize:9,color:_winCol,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",marginBottom:2}}>{_isTitle?"🏆 TITOLO":"SE VINCI"}</div>
                <div style={{display:"flex",gap:8,alignItems:"baseline",justifyContent:"flex-end"}}>
                  <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:900,color:_winCol}}>+{_ptsWin}<span style={{fontSize:10,fontWeight:600}}> pts</span></span>
                  <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:13,fontWeight:700,color:_winCol}}>€{fmt(_przWin)}</span>
                </div>
              </div>
            </div>
          );
        })()}
      </div>

      <div style={{padding:"0 10px",marginTop:8}}>

        {/* 2. TABELLONE */}
        <div style={{background:"#0a1422",border:"1px solid #1e3a5f",borderRadius:10,overflow:"hidden",marginBottom:8}}>
          {allSetCols.length>0&&(
            <div style={{display:"flex",borderBottom:"1px solid #1e3a5f",background:"#0a1020"}}>
              <div style={{flex:1,padding:"6px 10px",fontSize:12,color:"#475569",fontWeight:800,letterSpacing:1.2}}>GIOCATORE</div>
              {allSetCols.map((_,i)=>(
                <div key={i} style={{width:36,textAlign:"center",padding:"6px 0",fontSize:12,color:"#475569",fontWeight:800}}>S{i+1}</div>
              ))}
              <div style={{width:44,textAlign:"center",padding:"6px 0",fontSize:12,color:"#475569",fontWeight:800}}>GEM</div>
            </div>
          )}
          {[{name:player.name,rank:player.rank,isPlayer:true},{name:opp.name,rank:opp.rank,isPlayer:false}].map((pl,ri)=>{
            const isServing=(ri===0&&serving==="player")||(ri===1&&serving==="opp");
            const wonMatch=result&&((ri===0&&result.won)||(ri===1&&!result.won));
            const lostMatch=result&&!wonMatch;
            const rowBg=ri===0?"rgba(59,130,246,0.06)":"rgba(239,68,68,0.04)";
            const nameCol=wonMatch?"#10b981":lostMatch?"#ef444488":"#e2e8f0";
            const curG=ri===0?curPG:curOG;
            return(
              <div key={ri} style={{display:"flex",alignItems:"center",background:rowBg,borderBottom:ri===0?"1px solid #1e3a5f33":"none",minHeight:42}}>
                <div style={{flex:1,padding:"6px 10px",display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                  {isServing&&!result&&<span style={{fontSize:10,color:"#f59e0b",flexShrink:0}}>●</span>}
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:15,color:nameCol,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {pl.isPlayer?"👤 ":""}{pl.name}
                    </div>
                    <div style={{fontSize:12,color:"#475569",fontWeight:600}}>#{pl.rank}</div>
                  </div>
                </div>
                {allSetCols.map((sc,si)=>{
                  const setScore=ri===0?sc.pg:sc.og;
                  const oppScore=ri===0?sc.og:sc.pg;
                  const wonSet=sc.done&&setScore>oppScore;
                  const lostSet=sc.done&&setScore<oppScore;
                  return(
                    <div key={si} style={{width:36,textAlign:"center",fontSize:15,fontWeight:"bold",
                      color:sc.done?(wonSet?"#10b981":lostSet?"#ef4444":"#94a3b8"):"#f59e0b",
                      opacity:sc.done?1:0.9}}>
                      {setScore}
                    </div>
                  );
                })}
                <div style={{width:44,textAlign:"center",fontSize:16,fontWeight:900,
                  color:ri===0?(curG>=(curOG+1)?"#60a5fa":"#94a3b8"):(curOG>=(curPG+1)?"#f87171":"#94a3b8")}}>

                  ?(result.won&&fromEnd2===0?5:(tt3.rounds-fromEnd2))
                  :(result.won?Math.max(0,6-fromEnd2):Math.max(0,6-fromEnd2-1));
              const prizeEarned=tourn?getMatchMoney(tourn.type,tt3.prize,pfIdx2):0;
              const netEcon=prizeEarned-totalSpese;
              const netCol=netEcon>=0?"#10b981":"#ef4444";
              const ptsEarned=tourn?getMatchPts(tourn.type,fromEnd2,result.won):0;
              const ptsDifend=(player.history||[]).filter(h=>h.tournament===tourn?.name&&h.year===(year-1)&&h.week===tourn?.week&&h.isExit).reduce((s,h)=>s+(h.pts||0),0);
              const netPts=ptsEarned-ptsDifend;
              const roundLabel=getRoundName(round,tt3.rounds);
              return(
                <div style={{background:"#060d18",border:"1px solid #1e293b",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                  <div style={{fontSize:11,color:"#475569",fontWeight:800,letterSpacing:1.2,textTransform:"uppercase",marginBottom:8}}>Riepilogo settimana</div>
                  {/* Riga spese vs prize */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div>
                      <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>💸 Uscite settimana</div>
                      <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:17,fontWeight:900,color:"#ef4444"}}>−€{fmt(totalSpese)}</div>
                      {staffCostWeek>0&&<div style={{fontSize:10,color:"#475569",marginTop:1}}>torneo €{fmt(ec.total)} + staff €{fmt(staffCostWeek)}</div>}
                    </div>
                    <div style={{fontSize:20,color:"#1e3a5f",padding:"0 8px"}}>→</div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:11,color:"#64748b",marginBottom:2}}>🏆 {roundLabel} {result.won?"(Titolo)":"(Eliminato)"}</div>
                      <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:17,fontWeight:900,color:prizeEarned>0?"#10b981":"#475569"}}>{prizeEarned>0?`+€${fmt(prizeEarned)}`:"€0"}</div>
                    </div>
                  </div>
                  {/* Saldo netto economico */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"7px 10px",marginBottom:8}}>
                    <span style={{fontSize:13,color:"#94a3b8",fontWeight:700}}>Saldo netto settimana</span>
                    <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:17,fontWeight:900,color:netCol}}>
                      {netEcon>=0?`+€${fmt(netEcon)}`:`−€${fmt(Math.abs(netEcon))}`}
                    </span>
                  </div>
                  {/* Punti ATP */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ptsDifend>0?4:0}}>
                    <span style={{fontSize:12,color:"#64748b"}}>⭐ Punti ATP guadagnati</span>
                    <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:900,color:ptsEarned>0?"#818cf8":"#475569"}}>{ptsEarned>0?`+${ptsEarned} pts`:"0 pts"}</span>
                  </div>
                  {ptsDifend>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12,color:"#64748b"}}>⏳ Da difendere (anno prec.)</span>
                    <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:900,color:"#ef4444"}}>−{ptsDifend} pts</span>
                  </div>}
                  {ptsDifend>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"7px 10px"}}>
                    <span style={{fontSize:13,color:"#94a3b8",fontWeight:700}}>Saldo netto ATP</span>
                    <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:17,fontWeight:900,color:netPts>=0?"#818cf8":"#ef4444"}}>{netPts>=0?`+${netPts}`:`${netPts}`} pts</span>
                  </div>}
                </div>
              );
            })()}

            {/* Bottone continua/calendario */}
            <button onClick={()=>{if(finishCalled)return;setFinishCalled(true);onFinish(result.won,sets,{domWon:domSetsWon,domLost:domSetsLost,finalMorale:liveMoreale,startWinPct,pureWinPct});}} disabled={finishCalled}
              style={{width:"100%",background:result.won?"linear-gradient(90deg,#10b981,#3b82f6)":"#1e3a5f",border:result.won?"none":"1px solid #3b82f655",borderRadius:10,padding:"13px 0",color:"#fff",fontWeight:800,fontSize:16,cursor:finishCalled?"not-allowed":"pointer",opacity:finishCalled?0.6:1}}>
              {result.won?"Continua →":"← Torna al Calendario"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════
// WORLDMAP — Dashboard geo 4 tile (opzione B)
// ═══════════════════════════════════════════════════

// Nomi completi e bandiere rappresentative per ogni zona
const ZONE_FULLNAME={
  "Europa":"Europa & Russia",
  "Americas":"Nord & Sud America",
  "Asia-Pacifico":"Asia & Pacifico",
  "Africa-MO":"Africa & Medio Oriente",
};
const ZONE_FLAGS={
  "Europa":          ["🇮🇹","🇫🇷","🇩🇪","🇬🇧","🇪🇸"],
  "Americas":        ["🇺🇸","🇨🇦","🇧🇷","🇦🇷","🇲🇽"],
  "Asia-Pacifico":   ["🇯🇵","🇨🇳","🇦🇺","🇮🇳","🇰🇷"],
  "Africa-MO":       ["🇿🇦","🇲🇦","🇦🇪","🇶🇦","🇪🇬"],
};

function WorldMap({currentZone,flightFrom,flightTo,flightProgress,zoneCosts}){
  const zones=["Americas","Europa","Africa-MO","Asia-Pacifico"];
  const isFlying=flightFrom&&flightTo&&flightProgress>0&&flightProgress<1;
  const destZone=isFlying?flightTo:currentZone;

  const tileRefs=React.useRef({});
  const [tilePos,setTilePos]=React.useState({});
  const containerRef=React.useRef(null);

  React.useLayoutEffect(()=>{
    const pos={};
    zones.forEach(z=>{
      const el=tileRefs.current[z];
      const cont=containerRef.current;
      if(el&&cont){
        const er=el.getBoundingClientRect();
        const cr=cont.getBoundingClientRect();
        pos[z]={x:er.left-cr.left+er.width/2,y:er.top-cr.top+er.height/2,w:er.width,h:er.height};
      }
    });
    setTilePos(pos);
  },[flightFrom,flightTo,flightProgress]);

  // Arco aereo
  let planeX=0,planeY=0,planeAngle=0,trailD="";
  if(isFlying&&tilePos[flightFrom]&&tilePos[flightTo]){
    const fc=tilePos[flightFrom],tc=tilePos[flightTo];
    const mx=(fc.x+tc.x)/2,my=(fc.y+tc.y)/2;
    const lift=Math.min(35,Math.abs(tc.x-fc.x)*0.35);
    const cpx=mx,cpy=my-lift;
    const bx=t=>(1-t)*(1-t)*fc.x+2*(1-t)*t*cpx+t*t*tc.x;
    const by=t=>(1-t)*(1-t)*fc.y+2*(1-t)*t*cpy+t*t*tc.y;
    planeX=bx(flightProgress);planeY=by(flightProgress);
    const t2=Math.min(flightProgress+0.05,1);
    planeAngle=Math.atan2(by(t2)-planeY,bx(t2)-planeX)*180/Math.PI;
    const steps=Math.floor(flightProgress*20);
    const pts=[];
    for(let i=0;i<=steps;i++){const t=i/20;pts.push(`${i===0?"M":"L"}${bx(t).toFixed(1)},${by(t).toFixed(1)}`);}
    trailD=pts.join(" ");
  }

  return(
    <div ref={containerRef} style={{width:"100%",background:"#04090f",borderTop:"1px solid #0d1f3c",position:"relative",padding:"7px 7px 5px",boxSizing:"border-box"}}>
      {/* SVG overlay solo per aereo animato */}
      <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:5}} overflow="visible">
        {trailD&&<path d={trailD} fill="none" stroke={ZONE_COLOR[destZone]} strokeWidth="2" strokeDasharray="5 4" opacity="0.75"/>}
        {isFlying&&planeX>0&&(
          <text x={planeX} y={planeY} textAnchor="middle" dominantBaseline="middle"
            fontSize="15" transform={`rotate(${planeAngle},${planeX},${planeY})`}
            style={{filter:`drop-shadow(0 0 5px ${ZONE_COLOR[destZone]})`}}>✈</text>
        )}
      </svg>

      {/* Griglia 4 tile */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5,position:"relative",zIndex:2}}>
        {zones.map(z=>{
          const isActive=z===currentZone;
          const isFlyFrom=isFlying&&z===flightFrom;
          const isFlyTo=isFlying&&z===flightTo;
          const col=ZONE_COLOR[z];
          // Costo da prop zoneCosts (calcolato nel GameScreen dove week/player/CAL sono disponibili)
          const zc=zoneCosts?zoneCosts[z]:null;
          const travelCost=zc?zc.cost:null;
          const travelWeek=zc?zc.week:null;
          const flags=ZONE_FLAGS[z]||[];
          const fullName=ZONE_FULLNAME[z]||z;
          // Colore unico per TUTTO il nome — mai differenziare tra parti
          const nc=isActive?col:"#c0d4e8";
          return(
            <div key={z} ref={el=>tileRefs.current[z]=el}
              style={{
                background:isActive?`${col}20`:(isFlyTo?`${col}10`:`rgba(255,255,255,0.03)`),
                border:`1.5px solid ${isActive?col:(isFlyTo?col+"88":"#0e1f35")}`,
                borderRadius:10,
                padding:"8px 5px 7px",
                textAlign:"center",
                position:"relative",
                boxShadow:isActive?`0 0 14px ${col}30`:"none",
                transition:"all 0.3s",
              }}>
              {(isFlyFrom||isFlyTo)&&(
                <div style={{position:"absolute",top:3,right:4,fontSize:11}}>{isFlyFrom?"🛫":"🛬"}</div>
              )}
              <div style={{fontSize:14,letterSpacing:1,marginBottom:5,lineHeight:1}}>{flags.slice(0,3).join(" ")}</div>
              {/* Nome: ogni parte ha IDENTICO fontWeight 800 e IDENTICO colore nc */}
              {fullName.split("&").map((part,i)=>(
                <div key={i} style={{fontWeight:800,fontSize:13,color:nc,lineHeight:1.25}}>
                  {i===0?part.trim():`& ${part.trim()}`}
                </div>
              ))}
              <div style={{height:"1px",background:isActive?col+"55":"#0e1f35",margin:"5px 0"}}/>
              {isActive?(
                <div style={{fontSize:12,fontWeight:800,color:col}}>📍 Sei qui</div>
              ):travelCost!==null?(
                <div style={{fontSize:12,fontWeight:700,color:"#5a7a90"}}>✈ €{fmt(travelCost)}<span style={{fontSize:11,color:"#4a6a80",fontWeight:600,marginLeft:2}}>Sett.{travelWeek}</span></div>
              ):(
                <div style={{fontSize:11,color:"#1e3a52"}}>Nessun torneo</div>
              )}
            </div>
          );
        })}
      </div>
      {/* Banner volo attivo */}
      {isFlying&&(
        <div style={{marginTop:5,fontSize:11,fontWeight:700,color:ZONE_COLOR[destZone],
          textAlign:"center",letterSpacing:0.3}}>
          ✈ {ZONE_EMOJI[flightFrom]} {flightFrom} → {ZONE_EMOJI[flightTo]} {flightTo}
          {" "}<span style={{fontWeight:400,color:"#4e6680",fontSize:10}}>({Math.round(flightProgress*100)}%)</span>
        </div>
      )}
    </div>
  );
}
