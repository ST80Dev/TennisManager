              {prevYearSameWeek&&(
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(71,85,105,0.12)",borderRadius:7,padding:"6px 10px",marginBottom:8,border:"1px solid #1e293b"}}>
                  <span style={{color:"#64748b",fontSize:12}}>A{year-1} sett.{week}:</span>
                  <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:800,color:prevYearSameWeek.r<curR?"#10b981":prevYearSameWeek.r>curR?"#ef4444":"#94a3b8",fontSize:15}}>
                    #{prevYearSameWeek.r}
                    <span style={{fontSize:11,fontWeight:600,marginLeft:6,color:"#475569"}}>
                      ({prevYearSameWeek.r>curR?"+"+(prevYearSameWeek.r-curR):prevYearSameWeek.r<curR?"-"+(curR-prevYearSameWeek.r):"="} pos vs ora)
                    </span>
                  </span>
                </div>
              )}
              {/* Prossima soglia */}
              {nextMilestone&&(
                <div style={{background:"rgba("+{
                  "#6b7280":"107,114,128","#10b981":"16,185,129","#3b82f6":"59,130,246","#8b5cf6":"139,92,246","#f59e0b":"245,158,11"
                }[nextMilestone.col]+",0.10)",border:"1px solid "+nextMilestone.col+"44",borderRadius:8,padding:"7px 10px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:11,color:nextMilestone.col,fontWeight:800}}>🎯 Prossima soglia: {nextMilestone.label}</span>
                    <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:15,color:nextMilestone.col}}>{distToNext} pos.</span>
                  </div>
                  <div style={{height:4,background:"#0f172a",borderRadius:2}}>
                    <div style={{height:"100%",background:nextMilestone.col,borderRadius:2,width:Math.max(4,Math.min(100,(1-distToNext/50)*100))+"%",transition:"width 0.3s"}}/>
                  </div>
                  <div style={{fontSize:12,color:"#64748b",fontWeight:500,marginTop:3}}>{nextMilestone.desc}</div>
                </div>
              )}
              {/* [DEV] Test ticker — bottone visibile solo se log vuoto */}
              {careerLog.length===0&&(
                <div style={{marginTop:10,textAlign:"center"}}>
                  <button onClick={()=>setCareerLog([
                    {cat:"injury",icon:"🤕",title:"Problema alla spalla destra",year,week},
                    {cat:"logistics",icon:"✈️",title:"Volo cancellato per Dubai",year,week},
                    {cat:"form",icon:"😟",title:"Crisi di fiducia — tre sconfitte",year,week},
                    {cat:"positive",icon:"⚡",title:"Sessione di allenamento storica",year,week},
                    {cat:"color",icon:"📰",title:"Intervista al quotidiano sportivo",year,week},
                  ])} style={{background:"rgba(100,116,139,0.10)",border:"1px dashed #334155",borderRadius:8,padding:"5px 14px",color:"#475569",fontSize:11,cursor:"pointer",fontWeight:600}}>
                    🧪 Test ticker notizie
                  </button>
                </div>
              )}
              {/* Best per stagione (da anno 2) */}
              {Object.keys(yearMap).length>1&&(
                <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #0f172a",display:"flex",gap:5,flexWrap:"wrap"}}>
                  {Object.entries(yearMap).map(([y,r])=>(
                    <div key={y} style={{background:"#0f172a",borderRadius:5,padding:"3px 8px",fontSize:11}}>
                      <span style={{color:"#64748b",fontWeight:600}}>A{y} </span>
                      <span style={{color:"#f59e0b",fontWeight:700,fontFamily:"'Rajdhani',sans-serif"}}>#{r}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── PUNTI DA DIFENDERE ── */}
            {year>1&&(
              <div style={{background:"#060d18",borderRadius:10,padding:"12px 14px",border:"1px solid #1e293b"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:defend.length>0?10:0}}>
                  <span style={{fontSize:12,fontWeight:800,color:"#94a3b8",letterSpacing:0.5}}>⏳ PUNTI DA DIFENDERE</span>
                  {totalDefend>0&&<span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:15,color:"#ef4444"}}>−{totalDefend} tot.</span>}
                </div>
                {defend.length===0?(
                  <div style={{fontSize:12,color:"#334155",textAlign:"center",padding:"6px 0"}}>Nessun punto in scadenza nelle prossime settimane</div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {defend.map(d=>{
                      const isUrgent=d.week<=week+3;
                      const isBig=d.pts>=90;
                      return(
                        <div key={d.week} style={{background:isUrgent?"rgba(239,68,68,0.07)":"#0a1628",border:"1px solid "+(isUrgent?"#ef444433":"#1e293b"),borderRadius:8,padding:"7px 10px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                            <span style={{fontSize:12,fontWeight:700,color:isUrgent?"#fca5a5":"#94a3b8"}}>
                              {isUrgent?"🔴":"🕐"} Sett. {d.week}
                              {isUrgent&&<span style={{fontSize:11,color:"#ef4444",marginLeft:5}}>({d.week-week} sett.)</span>}
                            </span>
                            <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:15,color:isBig?"#ef4444":"#f87171"}}>−{d.pts} pts</span>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:2}}>
                            {d.tournaments.map((t,ti)=>(
                              <div key={ti} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569"}}>
                                <span>{getTourFlag(t.name)} {t.name}</span>
                                <span style={{color:"#334155"}}>{t.round} · {t.pts}pts</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </Card>

          <Card>

          </Card>

          {/* Stats card — Caratteristiche + Forza per superficie */}
          <Card>
            <STitle>CARATTERISTICHE</STitle>
            {STAT_KEYS.map(s=><StatBar key={s} label={STAT_LABELS[s]} icon={STAT_ICONS[s]} val={player.stats[s]||0}/>)}
            {(()=>{
              const _sa=player.startAge||17;
              const _AGE_POOL={15:35,16:42,17:50,18:55,19:60};
              const _poolStart=_AGE_POOL[_sa]||50;
              const _weeksPlayed=((year-1)*51)+week;
              const _trainWeeks=Math.round(_weeksPlayed*0.60);
              const _slotsPerStat=Math.round(_trainWeeks*4/7);
              const _gainPerSlot=0.11*0.85*0.90;
              const _theoreticalGainPerStat=_gainPerSlot*_slotsPerStat;
              const _theoreticalTotal=_poolStart+_theoreticalGainPerStat*7;
              const _currentTotal=STAT_KEYS.reduce((a,k)=>a+(player.stats[k]||0),0);
              const _excess=_currentTotal-_theoreticalTotal;
              if(_excess<=3) return null;
              const _scale=_theoreticalTotal/_currentTotal;
              const _preview={};
              STAT_KEYS.forEach(k=>{_preview[k]=Math.max(1,parseFloat((_scale*(player.stats[k]||1)).toFixed(2)));});
              const _rShow=showRicalib;
              const _setRShow=setShowRicalib;
              return(
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed #334155"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:_rShow?8:0}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:"#f59e0b"}}>⚖️ Ricalibrazione save</div>
                      <div style={{fontSize:11,color:"#64748b",marginTop:1}}>Stat superiori alla curva teorica di +{_excess.toFixed(1)}pt</div>
                    </div>
                    <button onClick={()=>_setRShow(v=>!v)}
                      style={{background:_rShow?"rgba(245,158,11,0.15)":"rgba(100,116,139,0.12)",border:`1px solid ${_rShow?"#f59e0b":"#334155"}`,borderRadius:7,padding:"5px 11px",color:_rShow?"#f59e0b":"#94a3b8",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      {_rShow?"▲ Chiudi":"▼ Vedi"}
                    </button>
                  </div>
                  {_rShow&&(
                    <div>
                      <div style={{background:"#060d18",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:"4px 10px",alignItems:"center",marginBottom:4}}>
                          <span style={{fontSize:10,color:"#334155",fontWeight:700,borderBottom:"1px solid #1e293b",paddingBottom:3}}>STAT</span>
                          <span style={{fontSize:10,color:"#334155",fontWeight:700,borderBottom:"1px solid #1e293b",paddingBottom:3,textAlign:"right"}}>ORA</span>
                          <span style={{fontSize:10,color:"#334155",fontWeight:700,borderBottom:"1px solid #1e293b",paddingBottom:3,textAlign:"center"}}>→</span>
                          <span style={{fontSize:10,color:"#334155",fontWeight:700,borderBottom:"1px solid #1e293b",paddingBottom:3,textAlign:"right"}}>DOPO</span>
                          {STAT_KEYS.map(k=>{
                            const cur=player.stats[k]||0;
                            const nxt=_preview[k];
                            const delta=nxt-cur;
                            return(<React.Fragment key={k}>
                              <span style={{fontSize:12,color:"#94a3b8"}}>{STAT_LABELS[k]}</span>
                              <span style={{fontSize:13,fontWeight:700,color:"#64748b",fontFamily:"'Rajdhani',sans-serif",textAlign:"right"}}>{cur.toFixed(2)}</span>
                              <span style={{fontSize:11,color:"#334155",textAlign:"center"}}>→</span>
                              <span style={{fontSize:13,fontWeight:700,color:"#ef4444",fontFamily:"'Rajdhani',sans-serif",textAlign:"right"}}>{nxt.toFixed(2)} <span style={{fontSize:10,color:"#7f1d1d"}}>({delta.toFixed(2)})</span></span>
                            </React.Fragment>);
                          })}
                        </div>
                        <div style={{fontSize:11,color:"#64748b",borderTop:"1px solid #1e293b",paddingTop:5,marginTop:2}}>
                          Totale: {_currentTotal.toFixed(1)} → {_theoreticalTotal.toFixed(1)} · scala ×{_scale.toFixed(3)}
                        </div>
                      </div>
                      <div style={{fontSize:11,color:"#475569",marginBottom:8,lineHeight:1.5}}>
                        Le proporzioni tra stat vengono mantenute. Le scelte di allenamento restano valide.
                      </div>
                      <button onClick={()=>{
                        const newStats={};
                        STAT_KEYS.forEach(k=>{newStats[k]=Math.max(1,parseFloat((_scale*(player.stats[k]||1)).toFixed(2)));});
                        setPlayer(p=>({...p,stats:newStats}));
                        _setRShow(false);
                        notify("⚖️ Stat ricalibrate alla curva teorica","#f59e0b");
                      }} style={{width:"100%",background:"linear-gradient(90deg,#92400e,#b45309)",border:"none",borderRadius:8,padding:"9px 0",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",letterSpacing:0.5}}>
                        ⚖️ Ricalibra le stat
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}
            <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #334155"}}>
              <STitle>FORZA PER SUPERFICIE</STitle>
              {["Cemento","Terra Rossa","Erba"].map(surf=>{const str=Math.round(pStr(player.stats,surf)*3.2);return(
                <div key={surf} style={{marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:2}}><span style={{color:SURF_COL[surf]}}>● {surf}</span><span style={{color:"#cbd5e1"}}>{str}/100</span></div>
                  <div style={{height:5,background:"#0f172a",borderRadius:3}}><div style={{height:"100%",width:`${clamp(str,0,100)}%`,background:SURF_COL[surf],borderRadius:3}}/></div>
                </div>
              );})}
            </div>
          </Card>

          <Card>
            <STitle>💾 SALVATAGGIO</STitle>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Salvataggio automatico nel browser. Usa Esporta per portare la partita su altri dispositivi.</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>{exportSave({week,year,player,atpWorld:world,brackets,staff,activeTour,tourRound,weekDone});notify("💾 File scaricato!","#10b981");}} style={{background:"#10b981",border:"none",borderRadius:8,padding:"10px 0",color:"#fff",fontWeight:"bold",cursor:"pointer",fontSize:14}}>📤 Esporta salvataggio</button>
              <button onClick={()=>fileRef.current?.click()} style={{background:"#3b82f6",border:"none",borderRadius:8,padding:"10px 0",color:"#fff",fontWeight:"bold",cursor:"pointer",fontSize:14}}>📥 Importa salvataggio</button>
              <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])importSave(e.target.files[0],state=>{saveL(state);window.location.reload();});}}/>
              <button onClick={()=>{if(window.confirm("Cancellare il salvataggio e ricominciare da zero?")){delL();window.location.reload();}}} style={{background:"#334155",border:"none",borderRadius:8,padding:"9px 0",color:"#94a3b8",cursor:"pointer",fontSize:13}}>🗑 Azzera carriera</button>
            </div>
          </Card>
          </>
          );
        })()}

      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"#1e293b",borderTop:"1px solid #334155",display:"flex",zIndex:50}}>
        {[["cal","📅","Calendario"],["ranking","🏆","Classifica"],["history","📋","Storico"],["profile","👤","Profilo"]].map(([id,ico,lbl])=>(
          <button key={id} onClick={()=>setView(id)} style={{flex:1,background:"none",border:"none",padding:"9px 0 8px",color:view===id?"#f59e0b":"#94a3b8",fontSize:13,cursor:"pointer",fontWeight:view===id?700:500}}>
            <div style={{fontSize:22}}>{ico}</div><div style={{marginTop:2,letterSpacing:0.3}}>{lbl}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════
function App(){
  const[screen,setScreen]=useState("boot");
  const[gs,setGs]=useState(null);
  const[hasSave,setHasSave]=useState(false);
  useEffect(()=>{const s=loadL();setHasSave(!!s);setScreen("creation");},[]);
  function startNew(pd){
    const w=buildWorld();
    // Budget, età e punti ATP iniziali dal profilo scelto in CharCreation
    const AGE_BUDGETS={15:1800,16:2400,17:3200,18:4000,19:5000};
    // Punti ATP di partenza: 15=0 (fuori classifica), 19=81 (≈rank 350)
    const AGE_START_PTS={15:0,16:12,17:26,18:40,19:81};
    const age=pd.startAge||17;
    const budget=AGE_BUDGETS[age]||4500;
    const startPts=AGE_START_PTS[age]||0;
    const startRank=startPts>0?rankForAtpPts(startPts):400;
    const state={week:1,year:1,brackets:{},activeTour:null,tourRound:0,weekDone:false,staff:{},morale:50,atpWorld:w,sponsor:null,
      gameMode:pd.gameMode||"classic",
      player:{...pd,rank:startRank,atpPoints:startPts,money:budget,fatigue:0,age,wins:0,losses:0,titles:0,history:[],careerStartRank:startRank,bestRankEver:startRank,currentZone:(NATS.find(n=>n.c===pd.nationality)?.z||"Europa"),homeZone:(NATS.find(n=>n.c===pd.nationality)?.z||"Europa")}};
    saveL(state);setGs(state);setScreen("game");
  }
  function resume(){const s=loadL();if(s){const migratedWorld=migrateWorldPool(s.atpWorld||{});const migrated={...s,atpWorld:migratedWorld};saveL(migrated);setGs(migrated);setScreen("game");}}
  if(screen==="boot")return <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18}}>🎾 Caricamento ATP Career...</div>;
  function handleImport(f){importSave(f,state=>{const migratedWorld=migrateWorldPool(state.atpWorld||{});const migrated={...state,atpWorld:migratedWorld};saveL(migrated);setGs(migrated);setHasSave(true);setScreen("game");});}
  if(screen==="creation")return <CharCreation onStart={startNew} hasSave={hasSave} onResume={resume} onImport={handleImport}/>;
  if(screen==="game"&&gs)return <GameScreen gs={gs}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
