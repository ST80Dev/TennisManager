  // Calcola moltiplicatore frequenza per anno di carriera
  function evtYearMult(yr){
    if(yr<=1) return 0.10; // anno 1: rarissimi, quasi solo colore
    if(yr===2) return 0.40; // anno 2: ancora rari
    if(yr===3) return 0.70; // anno 3: frequenza media
    return 1.0;
  }

  // Sceglie un evento random da una categoria
  function pickEvt(cat){
    const pool=EVT_POOL[cat];
    const e=pool[Math.floor(Math.random()*pool.length)];
    const ti=Math.floor(Math.random()*e.titles.length);
    const di=Math.floor(Math.random()*e.descs.length);
    return {id:e.id, cat, icon:e.icon, severe:e.severe||false,
            title:e.titles[ti], desc:e.descs[di]};
  }

  // Applica effetto immediato di un evento al player e agli stati
  function applyEvtEffect(evtId, pIn, moraleIn, staffIn){
    const fx=EVT_EFFECTS[evtId]||{};
    let pOut={...pIn};
    let newMorale=moraleIn;
    let addActive=null;

    // Scala il costo monetario al rank/punti del giocatore
    // Fuori classifica (<40pts): ×0.10  |  rank 351-400: ×0.20  |  rank 251-350: ×0.40
    // rank 101-250: ×0.70  |  rank <=100: ×1.0
    function evtScaledCost(base){
      const r=pIn.rank||500;
      const pts=pIn.atpPoints||0;
      if(pts<40) return Math.round(base*0.10); // fuori classifica
      const mult=r>350?0.20:r>250?0.40:r>100?0.70:1.0;
      return Math.round(base*mult);
    }
    if(fx.moneyCost) pOut={...pOut,money:(pOut.money||0)-evtScaledCost(fx.moneyCost)};
    // Bonus TV: guadagno monetario proporzionale al rank (visibilità mediatica)
    if(fx.tvBonus){
      const r=pIn.rank||500; const pts=pIn.atpPoints||0;
      const tvGain=pts<40?300:r>350?300:r>250?600:r>100?1200:2500;
      pOut={...pOut,money:(pOut.money||0)+tvGain,_tvGain:tvGain};
    }
    if(fx.moraleDelta) newMorale=clamp(moraleIn+(fx.moraleDelta||0),8,100);
    // Calo % immediato del morale
    if(fx.moralePctDrop) newMorale=Math.max(8,Math.round(newMorale*(1-fx.moralePctDrop)));

    // Effetti a durata: calcoliamo settimane ridotte dallo staff
    if(fx.weeks){
      const physioLvE=getStaffLevel(staffIn,"physio");
      const mentalLvE=getStaffLevel(staffIn,"mental");
      let wks=fx.weeks;
      const cat=Object.entries(EVT_EFFECTS).find(([k])=>k===evtId);
      // Fisio riduce injury, mental riduce form
      const isInjury=["inj_shoulder","inj_knee","inj_back","inj_ankle","inj_wrist","inj_serious","inj_fatigue_muscle","log_illness","log_delay"].includes(evtId);
      const isForm=["form_slump","form_burnout","form_mental","form_tech","form_doubt","form_pressure"].includes(evtId);
      if(isInjury&&physioLvE) wks=Math.max(1,wks-physioLvE.level);
      if(isForm&&mentalLvE)   wks=Math.max(1,wks-mentalLvE.level);
      // Calcola moraleCap assoluto dal morale corrente se l'evento usa % relativa
      const computedCap=fx.moralePctCap?Math.round(newMorale*fx.moralePctCap):fx.moraleCap||null;
      // weeksLeft+1: advanceWeek decrementa subito dopo l'evento, quindi al calendario
      // mostrerebbe già X-1. Inizializziamo a wks+1 per compensare il primo tick.
      addActive={evtId,weeksLeft:wks+1,...fx,moraleCap:computedCap};
    }

    // Stat penalty immediata (form_tech: -1pt su stat random)
    if(fx.statPenalty){
      const sk=STAT_KEYS[Math.floor(Math.random()*STAT_KEYS.length)];
      const ns={...pOut.stats,[sk]:parseFloat(Math.max(1,(pOut.stats[sk]||1)-1.0).toFixed(1))};
      pOut={...pOut,stats:ns};
    }

    // Infortunio grave: punti in scadenza nelle settimane bloccate
    if(fx.expirePoints&&fx.blockTournaments){
      // I punti verranno gestiti da advanceWeek normalmente — nessun intervento speciale
      // Il blocco tornei è gestito da activeEvents.blockTournaments
    }

    // Cooldown dinamico per categoria — range variabile, non fisso
    const cdRanges={
      injury:   [8,14],   // infortuni: guarigione lunga
      form:     [6,11],   // crisi mentali: recupero medio
      logistics:[8,14],   // logistica: cooldown più lungo per evitare cluster
      positive: [5,10],   // positivi: rari ma non troppo ravvicinati
      color:    [3,7],    // colore: i più frequenti
    };
    const evtCatForCd=evtId.startsWith("inj")||evtId.startsWith("log_ill")?"injury":
                      evtId.startsWith("log")?"logistics":
                      evtId.startsWith("form")?"form":
                      evtId.startsWith("pos")?"positive":"color";
    const[cdMin,cdMax]=cdRanges[evtCatForCd]||[6,10];
    const newCooldown=cdMin+Math.floor(Math.random()*(cdMax-cdMin+1));
    return {pOut, newMorale, addActive, evtCat:evtCatForCd, newCooldown};
  }

  // Motore principale: genera evento se le condizioni lo permettono
  // Chiamato a inizio settimana, PRIMA di advanceWeek
  function checkAndFireEvent(pCur, moraleCur, staffCur, yearCur, weekCur, consLosses, consTourns, activeEvts, noMatchContext=false, catCd={}){
    if(activeEvts.length>=2) return null; // max 2 attivi
    // Categorie già attive — non sovrapporre eventi dello stesso tipo
    const activeCats=new Set(activeEvts.map(ae=>{
      if(ae.evtId?.startsWith("inj")||ae.evtId?.startsWith("log_ill")) return "injury";
      if(ae.evtId?.startsWith("log")) return "logistics";
      if(ae.evtId?.startsWith("form")) return "form";
      if(ae.evtId?.startsWith("pos")) return "positive";
      return "color";
    }));
    // Categorie in cooldown — non possono scattare
    const blockedCats=new Set(Object.entries(catCd).filter(([,v])=>v>0).map(([k])=>k));
    const ym=evtYearMult(yearCur);
    // Anno 1: solo color e logistics leggeri (no injury, no form)
    // Anno 2: aggiunge form leggeri, esclude infortuni gravi
    const yr1Only=yearCur<=1;
    const yr2Only=yearCur===2;

    // ── TRIGGER LOGICI ──
    const logicalCandidates=[];
    const fat=pCur.fatigue||0;
    const rank=pCur.rank||500;

    // Infortuni logici: fatica alta (anni 1+, peso ridotto)
    if(!yr1Only&&!blockedCats.has("injury")){
      if(fat>72) logicalCandidates.push({cat:"injury",id:"inj_serious",w:0.08*ym});
      if(fat>60) logicalCandidates.push({cat:"injury",id:"inj_back",w:0.12*ym});
      if(fat>52) logicalCandidates.push({cat:"injury",id:"inj_shoulder",w:0.09*ym});
      if(fat>47) logicalCandidates.push({cat:"injury",id:"inj_knee",w:0.07*ym});
    }

    // Crisi forma: solo in contesto partita, anni 2+, non in cooldown
    // + guardia morale: eventi di crisi non scattano se il giocatore è mentalmente stabile
    if(!noMatchContext&&!yr1Only&&!blockedCats.has("form")){
      if(consLosses>=3&&moraleCur<50) logicalCandidates.push({cat:"form",id:"form_slump",w:0.22*ym});
      if(consLosses>=5&&moraleCur<45) logicalCandidates.push({cat:"form",id:"form_mental",w:0.12*ym});
      if(consLosses>=3&&moraleCur<55) logicalCandidates.push({cat:"form",id:"form_doubt",w:0.10*ym});
    }

    // Burnout: tornei consecutivi, anni 2+
    if(!yr1Only&&!blockedCats.has("form")){
      if(consTourns>=6) logicalCandidates.push({cat:"form",id:"form_burnout",w:0.25*ym});
    }
    if(!yr1Only&&!blockedCats.has("injury")){
      if(consTourns>=5) logicalCandidates.push({cat:"injury",id:"inj_wrist",w:0.10*ym});
    }

    // Logistica: molto ridotta, non in cooldown
    // log_flight: solo se il giocatore è fuori dalla sua zona (viaggia davvero)
    // rank<=200: top player viaggiano spesso tra zone diverse — più esposti a voli cancellati
    // rank 200-350: solo se effettivamente in zona diversa dalla home
    // SOGLIA PROBABILISTICA per log_flight: max ~1-2 volte/stagione
    // Il weighted sample sceglie SEMPRE dal pool se non vuoto — serve un gate esterno
    if(!blockedCats.has("logistics")&&!yr1Only){
      const pts=pCur.atpPoints||0;
      const isAwayFromHome=(pCur.currentZone&&pCur.homeZone&&pCur.currentZone!==pCur.homeZone);
      // 3.5% per settimana per rank≤200 → ~1-2 eventi/stagione
      // 1.5% per rank 200-350 solo se fuori casa
      if(pts>0&&rank<=200&&Math.random()<0.035) logicalCandidates.push({cat:"logistics",id:"log_flight",w:1.0});
      else if(pts>0&&rank<=350&&isAwayFromHome&&Math.random()<0.015) logicalCandidates.push({cat:"logistics",id:"log_flight",w:1.0});
    }

    // Estrai evento logico
    let evtId=null, evtCat=null;
    if(logicalCandidates.length>0){
      const totalW=logicalCandidates.reduce((s,c)=>s+c.w,0);
      let roll=Math.random()*totalW;
      for(const c of logicalCandidates){
        roll-=c.w;
        if(roll<=0){
          if(!activeEvts.find(a=>a.evtId===c.id)&&!activeCats.has(c.cat)){
            evtId=c.id; evtCat=c.cat;
          }
          break;
        }
      }
    }

    // ── DADO PURO — scatta se nessun logico ha triggerato ──
    if(!evtId){
      // Anno 1: soglia molto bassa, solo color e logistics
      // Anno 2: soglia bassa, aggiunge form leggeri
      // Anno 3+: soglia normale
      const threshold=yr1Only?0.008:yr2Only?0.028:0.075*ym;
      if(Math.random()<threshold){
        // Anno 1: soglia 0.8% (era 1.8%) — quasi impossibile nelle prime settimane
        // Solo color(70%) e logistics(30%), e da logistics escluso log_flight
        // Anno 2: color(30%) logistics(30%) form(25%) positive(15%)
        // Anno 3+: tutti i pesi normali
        let catRoll=Math.random();
        if(yr1Only){
          evtCat=catRoll<0.70?"color":"logistics";
        } else if(yr2Only){
          if(catRoll<0.30)      evtCat="color";
          else if(catRoll<0.60) evtCat="logistics";
          else if(catRoll<0.85) evtCat="form";
          else                  evtCat="positive";
        } else {
          if(catRoll<0.25)      evtCat="injury";
          else if(catRoll<0.50) evtCat="logistics";
          else if(catRoll<0.72) evtCat="form";
          else if(catRoll<0.88) evtCat="positive";
          else                  evtCat="color";
        }
        // Blocca se categoria in cooldown o già attiva
        if(blockedCats.has(evtCat)||activeCats.has(evtCat)){evtCat=null;}
        if(evtCat){
          // Anno 1: logistics esclude log_flight (il giocatore non vola quasi mai)
          // log_flight escluso dal dado puro: scatta solo per trigger logico contestuale
          const pureRollExcludes=["log_flight",...(yr1Only?["log_visa"]:[])]; // log_flight solo da trigger logico contestuale
          const pool=EVT_POOL[evtCat].filter(e=>!e.severe&&!activeEvts.find(a=>a.evtId===e.id)&&!pureRollExcludes.includes(e.id));
          if(pool.length>0){
            const picked=pool[Math.floor(Math.random()*pool.length)];
            evtId=picked.id;
          }
        }
        // Easter egg rarissimo
        if(evtId&&evtCat!=="positive"&&evtCat!=="color"&&Math.random()<0.035&&!blockedCats.has("positive")&&!activeCats.has("positive")){
          const pp=EVT_POOL.positive;
          evtCat="positive"; evtId=pp[Math.floor(Math.random()*pp.length)].id;
        }
      }
    }

    if(!evtId||!evtCat) return null;

    // Costruisci oggetto evento completo
    const pool=EVT_POOL[evtCat];
    const template=pool.find(e=>e.id===evtId)||pool[0];
    const ti=Math.floor(Math.random()*template.titles.length);
    const di=Math.floor(Math.random()*template.descs.length);
    return {
      id:evtId, cat:evtCat, icon:template.icon, severe:template.severe||false,
      title:template.titles[ti].replace("{name}",pCur.name||"Il giocatore"),
      desc:template.descs[di].replace("{name}",pCur.name||"Il giocatore"),
      year:yearCur, week:weekCur,
    };
  }

  // ── MIGRATION: allinea eta NPC al year corrente (salvataggi precedenti) ──
  useEffect(()=>{
    if(year>1){
      setWorld(prev=>{
        // Riordina per punti prima di rimappare (garantisce rank coerenti)
        const sorted=Object.values(prev).sort((a,b)=>(b.atpPoints||5)-(a.atpPoints||5));
        const corrected={};
        sorted.forEach((p,i)=>{
          const newRank=i+1;
          // Se l'eta sembra congelata all'anno 1 (non e' mai stata incrementata),
          // la correggiamo aggiungendo (year-1). Usiamo un flag per non ripetere.
          if(!p._ageMigrated){
            const correctedAge=(p.age||25)+(year-1);
            corrected[newRank]={...p,rank:newRank,age:correctedAge,_ageMigrated:true};
          } else {
            corrected[newRank]={...p,rank:newRank};
          }
        });
        return corrected;
      });
    }
  },[]);// eslint-disable-line

  useEffect(()=>{
    saveL({week,year,player,atpWorld:world,brackets,staff,activeTour,tourRound,weekDone,trainCount,morale,sponsor,winterDone,careerLog,activeEvents,consecutiveTournaments,consecutiveLosses,catCooldown,gameMode:gs.gameMode||"classic"});
  },[week,year,player,world,activeTour,tourRound,weekDone,staff]);

  // advanceWeek: exact one week, debt tracking, leveled staff
  function advanceWeek(updP, lastResult=null, moraleOverride=null, activeEvtsOverride=null, weekSkip=1){
    const p=updP||player;
    const staffCost=getStaffWeeklyCost(staff);
    // Living cost: applicato SOLO nelle settimane senza torneo (allenamento/riposo/pausa)
    // Copre affitto campo, vitto, alloggio casa — nelle settimane torneo il lodge è già pagato
    function livingCost(rank, isPausa){
      const base=rank>350?55:rank>300?75:rank>250?95:rank>200?120:rank>150?155:rank>100?200:rank>50?280:420;
      return isPausa?Math.round(base*0.6):base;
    }
    const nextWeek=(week%51)+1;
    const nextIsPausa=nextWeek>=42&&nextWeek<=51;
    const living=lastResult?0:livingCost(p.rank||500,nextIsPausa);
    let newMoney=(p.money||0)-staffCost-living;
    let updPlayer={...p,money:newMoney};
    const sparringLv=getStaffLevel(staff,"sparring");
    if(sparringLv&&(updPlayer.rank||500)<=250){
      const sk=STAT_KEYS[Math.floor(Math.random()*STAT_KEYS.length)];
      updPlayer={...updPlayer,stats:{...updPlayer.stats,[sk]:parseFloat(clamp((updPlayer.stats[sk]||0)+sparringLv.weeklyGain,1,35).toFixed(1))}};
    }
    const physioLvW=getStaffLevel(staff,"physio");
    const physioRec=physioLvW?physioLvW.recoveryBonus:0;
    // Recupero base + physio
    const baseRec=3+physioRec;
    updPlayer={...updPlayer,fatigue:Math.round(Math.max(0,(updPlayer.fatigue||0)-baseRec))};
    // Decadimento lieve stat non allenate (-0.05 su stat random ogni settimana)
    const decayStat=STAT_KEYS[Math.floor(Math.random()*STAT_KEYS.length)];
    const decayAmt=0.05;
    const decayedStats={...updPlayer.stats,[decayStat]:parseFloat(Math.max(1,(updPlayer.stats[decayStat]||1)-decayAmt).toFixed(2))};
    updPlayer={...updPlayer,stats:decayedStats};
    // Fix2: decay fisico età-dipendente (pro-rata settimanale)
    // Fisioterapista azzera il decay fisico età
    const physioLvAge=getStaffLevel(staff,"physio");
    const ageDecayAnnuo=(()=>{
      const a=updPlayer.age||17;
      if(a<28) return 0;
      if(a<30) return 0.10;
      if(a<32) return 0.25;
      if(a<34) return 0.50;
      if(a<36) return 0.80;
      if(a<38) return 1.20;
      return 1.80;
    })();
    if(ageDecayAnnuo>0&&!physioLvAge){
      const PHYS_STATS=["servizio","dritto","rovescio","volee","velocita","resistenza"];
      const decayPerStatPerWeek=ageDecayAnnuo/52/PHYS_STATS.length;
      const agedStats={...updPlayer.stats};
      PHYS_STATS.forEach(sk=>{
        agedStats[sk]=parseFloat(Math.max(1,(agedStats[sk]||1)-decayPerStatPerWeek).toFixed(2));
      });
      updPlayer={...updPlayer,stats:agedStats};
    }
    // Morale: override se presente, altrimenti decay
    // Decay si applica SEMPRE se morale >70 (anche dopo torneo: evita persistenza post-titolo)
    // Solo se morale <=70: decay solo nelle settimane senza torneo (!lastResult)
    if(moraleOverride!==null){
      setMorale(clamp(moraleOverride,0,100));
    } else {
      setMorale(m=>{
        const highDecay=m>70;          // morale alto: decade sempre
        const normalDecay=!lastResult; // morale normale: solo sett. libere
        if(!highDecay&&!normalDecay) return m;
        // Decay proporzionale: più è alto, più scende (atterraggio naturale)
        const decay=m>85?3:m>70?2:m>35?2:m>20?1:0;
        return clamp(m-decay,0,100);
      });
    }
    const newDebtWeeks=newMoney<0?(p.debtWeeks||0)+1:0;
    updPlayer={...updPlayer,debtWeeks:newDebtWeeks};
    let newStaff={...staff};
    if(newDebtWeeks===4){
      const hired=Object.keys(STAFF_LEVELS).filter(k=>newStaff[k]>0);
      if(hired.length>0){
        const costOf=k=>STAFF_LEVELS[k].levels[(newStaff[k]||1)-1]?.cost||0;
        const mostExp=hired.reduce((a,b)=>costOf(a)>=costOf(b)?a:b);
        newStaff={...newStaff,[mostExp]:0};setStaff(newStaff);
        notify(STAFF_LEVELS[mostExp].name+" si e' autolicenziato per mancato pagamento!","#ef4444");
      }
    }
    if(newDebtWeeks>=8){setPlayer(updPlayer);setScreen("gameover");return;}
    if(newDebtWeeks>0&&newDebtWeeks<4){
      notify("Finanze in rosso da "+newDebtWeeks+" sett. (max 8)","#ef4444");
      // Penalità debito morale: solo se morale >20 per evitare spirale
      if(!lastResult)setMorale(m=>m>20?clamp(m-3,0,100):m);
    }
    let nw=week+(weekSkip||1),ny=year;
    // careerStartRank: preserva il valore originale se gia' presente
    const csr=p.careerStartRank||400;
    // rankHistory: snapshot aggiunto DOPO il sync rank reale (vedi sotto) — usa il rank reale, non la stima da curva
    updPlayer={...updPlayer,careerStartRank:csr};
    // Pausa invernale: sett 42-51 — recupero fatica +8/sett extra, morale sale verso 60
    const isPausa=nw>=42&&nw<=51;
    if(isPausa){
      updPlayer={...updPlayer,fatigue:Math.round(Math.max(0,(updPlayer.fatigue||0)-8))};
      setMorale(m=>clamp(m+2,0,100));
    }
    if(nw>51){nw=1;ny=year+1;
      updPlayer={...updPlayer,age:(updPlayer.age||(player.startAge||17))+1,fatigue:Math.round(Math.max(0,(updPlayer.fatigue||0)-20))};
      notify("Fine stagione "+(2025+(ny-2))+"! "+updPlayer.name+" ha "+updPlayer.age+" anni.","#8b5cf6");
      setMorale(m=>clamp(Math.round(m*0.6+50*0.4),20,80));
      setWinterDone(false);
    }
    // Rolling 52 weeks: sottrai i punti guadagnati nella stessa settimana dell'anno scorso
    if(ny>1||(ny===year&&nw!==week)){
      const prevYear=nw<=week?year:year-1; // anno da cui sottrarre
      const targetWeek=nw; // settimana a cui stiamo passando
      const expiredPts=(updPlayer.history||[])
        .filter(h=>h.year===prevYear&&h.week===targetWeek)
        .reduce((sum,h)=>sum+(h.pts||0),0);
      if(expiredPts>0){
        const afterDecay=Math.max(0,(updPlayer.atpPoints||0)-expiredPts);
        // Non aggiornare .rank qui: sarà ricalcolato dopo simWeek con il mondo reale
        updPlayer={...updPlayer,atpPoints:afterDecay};
        if(expiredPts>=20) notify(`⏳ -${expiredPts}pts in scadenza (S${targetWeek} A${prevYear})`,"#ef4444");
      }
    }
    const{newWorld,brks,retiredCount,newNPCCount}=simWeek(nw,world,ny,{legendMode});
    if(retiredCount>0) notify(retiredCount===1?"Un giocatore si ritira dal circuito.":retiredCount+" giocatori si ritirano dal circuito.","#64748b");
    // ── Tick eventi attivi: decrementa durata, rimuovi scaduti ──
    const evtsToTick=activeEvtsOverride!==null?activeEvtsOverride:activeEvents;
    const hasSevereActive=evtsToTick.some(e=>e.severe||e.blockTournaments);
    const newActiveEvents=evtsToTick
      .map(e=>({...e,weeksLeft:(e.weeksLeft||1)-1}))
      .filter(e=>e.weeksLeft>0);
    setActiveEvents(newActiveEvents);
    // ── Sponsor check: checkpoint e scadenze ──
    let newSponsor=sponsor;
    if(sponsor&&!sponsor.expired&&!hasSevereActive){
      // Checkpoint intermedi (opzione C)
      if(sponsor.checkpoints){
        const cp=sponsor.checkpoints.find(c=>!c.done&&c.year===year&&c.week===week);
        if(cp){
          const cpTargetPts=cp.targetPts||atpPtsForRank(cp.targetRank||400);
          if((updPlayer.atpPoints||0)<cpTargetPts){
            updPlayer={...updPlayer,money:(updPlayer.money||0)-cp.restitution};
            notify(`⚠️ ${sponsor.company}: checkpoint mancato (${Math.round(updPlayer.atpPoints||0)}/${cpTargetPts}pts). −€${cp.restitution.toLocaleString("it-IT")} dedotti.`,"#ef4444");
          } else {
            notify(`✅ ${sponsor.company}: checkpoint superato! ${Math.round(updPlayer.atpPoints||0)}pts ≥ ${cpTargetPts}pts`,"#10b981");
          }
          newSponsor={...sponsor,checkpoints:sponsor.checkpoints.map(c=>c===cp?{...c,done:true}:c)};
        }
      }
      // Scadenza finale — usa (year, week) correnti, non (ny, nw) post-avanzamento
      if(sponsor.deadline.year===year&&sponsor.deadline.week===week){
        const spTargetPts=sponsor.targetPts||atpPtsForRank(sponsor.targetRank||400);
        if((updPlayer.atpPoints||0)<spTargetPts){
          updPlayer={...updPlayer,money:(updPlayer.money||0)-sponsor.restitution};
          notify(`❌ ${sponsor.company}: obiettivo mancato (${Math.round(updPlayer.atpPoints||0)}/${spTargetPts}pts). −€${sponsor.restitution.toLocaleString("it-IT")} dedotti.`,"#ef4444");
        } else {
          if(sponsor.bonus>0){
            updPlayer={...updPlayer,money:(updPlayer.money||0)+sponsor.bonus};
            notify(`🏆 ${sponsor.company}: obiettivo raggiunto! ${Math.round(updPlayer.atpPoints||0)}pts ≥ ${spTargetPts}pts · +€${sponsor.bonus.toLocaleString("it-IT")} bonus.`,"#10b981");
          } else {
            notify(`✅ ${sponsor.company}: contratto completato con successo!`,"#10b981");
          }
        }
        newSponsor={...sponsor,expired:true};
      }
    }
    // Decrementa cooldown per categoria ogni settimana
    setCatCooldown(cd=>({
      injury:  Math.max(0,(cd.injury||0)-1),
      form:    Math.max(0,(cd.form||0)-1),
      logistics:Math.max(0,(cd.logistics||0)-1),
      positive:Math.max(0,(cd.positive||0)-1),
      color:   Math.max(0,(cd.color||0)-1),
    }));
    // Applica effetti continui degli eventi attivi (moraleCap, fatigueFloor)
    // Usa evtsToTick (pre-tick) per applicare gli effetti della settimana corrente
    evtsToTick.forEach(ae=>{
      if(ae.moraleCap) setMorale(m=>Math.min(m,ae.moraleCap));
      if(ae.fatigueFloor) updPlayer={...updPlayer,fatigue:Math.max(updPlayer.fatigue||0,ae.fatigueFloor)};
    });
    // Sincronizza player.rank con la posizione reale nella classifica aggiornata
    // (il riordino NPC in simWeek può spostare il giocatore senza che lo sappia)
    const realRank=Object.values(newWorld).filter(p=>(p.atpPoints||0)>(updPlayer.atpPoints||0)).length+1;
    updPlayer={...updPlayer,rank:clamp(realRank,1,500)};
    // rankHistory: snapshot con rank reale post-simWeek — evita di registrare stime intermedie da curva
    const rh=[...(p.rankHistory||[]),{w:week,y:year,r:updPlayer.rank}].slice(-52);
    updPlayer={...updPlayer,rankHistory:rh};
    // Best rank calcolato DOPO sync — usa il rank reale aggiornato
    const newBest=Math.min(updPlayer.rank, updPlayer.bestRankEver||500);
    updPlayer={...updPlayer,bestRankEver:newBest};
    setWorld(newWorld);setBrackets(prev=>({...prev,...brks}));
    setPlayer(updPlayer);setWeek(nw);setYear(ny);
    if(newSponsor!==sponsor)setSponsor(newSponsor);
    setWeekDone(false);setTrainCount(0);setActiveTour(null);setTourRound(0);
    // ── Controllo eventi casuali a fine avanzamento settimana ──
    // Solo se non c'è già un risultato torneo (quei path hanno il proprio check)
    // e non siamo in pausa invernale
    if(!lastResult&&!isPausa&&newActiveEvents.length<2){
      const evtW=checkAndFireEvent(updPlayer,moraleOverride!==null?moraleOverride:morale,staff,ny,nw,consecutiveLosses,consecutiveTournaments,newActiveEvents,true,catCooldown);
      if(evtW){
        const{pOut:pW,newMorale:nmW,addActive:aW,evtCat:ecW,newCooldown:ncW}=applyEvtEffect(evtW.id,updPlayer,moraleOverride!==null?moraleOverride:morale,staff);
        const newLogW=[...careerLog,{cat:evtW.cat,icon:evtW.icon,title:evtW.title,year:ny,week:nw}].slice(-20);
        setCareerLog(newLogW);
        if(ncW&&ecW) setCatCooldown(cd=>({...cd,[ecW]:ncW}));
        if(aW) setActiveEvents(prev=>[...prev,aW].slice(0,2));
        if(nmW!==(moraleOverride!==null?moraleOverride:morale)) setMorale(nmW);
        setPlayer(pW);
        setNewsFlash(evtW);
      }
    }
  }
  function getOpp(rank,type){
    const spread={Slam:50,M1000:80,ATP500:120,ATP250:180,Challenger:60,ChallengerA:60,ChallengerB:60,ITF:40}[type]||100;
    const tr=clamp(Math.floor(rank+(Math.random()-0.35)*spread),1,400);
    return getATPPlayer(world,tr);
  }
  // usedOppIds: Set di ID stringa (es. "p143") — unici per torneo, reset ad ogni ingresso
  var usedOppIds=new Set();
  function getOppForRound(rank,type,roundNum){
    const spread={Slam:50,M1000:80,ATP500:120,ATP250:180,Challenger:60,ChallengerA:60,ChallengerB:60,ITF:40}[type]||100;
    // Clamp a 500 (non 400) per attingere agli NPC rank 401-500 negli ITF/ChalB
    const maxRank=500;
    for(let att=0;att<12;att++){
      const tr=clamp(Math.floor(rank+(Math.random()-0.35)*spread+(roundNum||0)*3),1,maxRank);
      const candidate=getATPPlayer(world,tr);
      if(!usedOppIds.has(candidate.id)){usedOppIds.add(candidate.id);return candidate;}
    }
    // fallback: cerca rank crescente finché non trovi un ID libero
    for(let d=1;d<=50;d++){
      for(const sign of [1,-1]){
        const tr=clamp(rank+d*sign,1,maxRank);
        const candidate=getATPPlayer(world,tr);
        if(!usedOppIds.has(candidate.id)){usedOppIds.add(candidate.id);return candidate;}
      }
    }
    // ultimo fallback assoluto
    const fb=clamp(rank+Math.ceil(spread*0.4)+(roundNum||0)*7,1,maxRank);
    const fbp=getATPPlayer(world,fb);usedOppIds.add(fbp.id);return fbp;
  }

  // triggerFlight: animazione aereo sulla WorldMap, nessun overlay, cb immediata
  function triggerFlight(from,to,cost,jetLag,cb){
    if(!from||from===to){cb();return;}
    const isIntercont=getZoneMult(from,to)>=2.0;
    const dur=isIntercont?5000:2500;
    setMapFlight({from,to,startTime:performance.now(),duration:dur});
    setTimeout(()=>setMapFlight(null),dur+300);
    cb();
  }

  function enterTournament(t){
    // Mostra sempre la schermata di conferma pre-torneo
    setRestPrompt(t);
  }

  // Chiamata con packFat = riduzione fatica acquistata (0 se nessun pack)
  function doEnterTournament(t, packFat=0, packCost=0){
    const tt2=TT[t.type]||TT.ATP250;
    const baseCost=TRAVEL_COSTS_BASE[t.type]||200;
    const pZone=player.currentZone||"Europa";
    const tZone=t.zone||"Europa";
    const travelCost=calcTravelCost(baseCost,pZone,tZone);
    const entryFee=ENTRY_FEE[t.type]||0;
    const nCollab=Object.values(staff).filter(v=>v>0).length;
    const lodgeCost=(LODGE_BASE[t.type]||0)+(LODGE_COLLAB[t.type]||0)*nCollab;
    const physioLv=getStaffLevel(staff,"physio");
    const physioReduce=physioLv?physioLv.jetLagReduce:0;
    const jetLag=Math.round(calcJetLag(pZone,tZone,player.money||0)*(1-physioReduce));
    // Applica riposo -30% fatica se scelto
    const fatAfterPack=Math.max(0,(player.fatigue||0)-packFat);
    if(packFat>0)notify(`💆 Trattamento recupero — fatica −${packFat}%`,"#38bdf8");
    // Jet lag applicato PRIMA del triggerFlight (come da note)
    setPlayer(p=>({...p,money:(p.money||0)-travelCost-entryFee-lodgeCost-packCost,currentZone:tZone,fatigue:clamp(fatAfterPack+jetLag,0,100)}));
    setLastTournResult(null);
    setRestPrompt(null);
    // Callback eseguita dopo l'animazione volo (o subito se stessa zona)
    function afterFlight(){
      matchDoneInProgress.current=false; // reset: nuovo torneo, nuova partita
      usedOppIds=new Set();
      const pEntry={...player,isPlayer:true};
      const liveBrkt=buildLiveBracket(t,world,pEntry);
      // Pre-popola usedOppIds con tutti gli NPC già presenti nel draw
      // → getOppForRound (usato come fallback) non ripescherà mai un avversario già nel tabellone
      liveBrkt.rounds[0]?.matches?.forEach(m=>{
        if(m.p1obj?.id) usedOppIds.add(m.p1obj.id);
        if(m.p2obj?.id) usedOppIds.add(m.p2obj.id);
      });
      const bKey=`${t.name}_${week}_live`;
      const playerMatch0=liveBrkt.rounds[0]?.matches?.find(m=>m.isPlayerMatch);
      const opp=playerMatch0?(playerMatch0.p1obj?.isPlayer?playerMatch0.p2obj:playerMatch0.p1obj)||getOppForRound(player.rank,t.type,0):getOppForRound(player.rank,t.type,0);
      setBrackets(prev=>({...prev,[bKey]:liveBrkt}));
      setActiveTour({...t,tt:tt2,totalRounds:tt2.rounds,liveKey:bKey});
      setTourRound(0);
      setMatchData({tourn:t,opp,bestOf:t.type==="Slam"?5:3,round:0,tt:tt2,totalRounds:tt2.rounds,entryCosts:{travel:travelCost,entry:entryFee,lodge:lodgeCost,pack:packCost,total:travelCost+entryFee+lodgeCost+packCost}});
      setMatchKey(k=>k+1);
      setWeekDone(true);
      // Mostra sorteggio animato prima del primo match
      const tt2draw=TT[t.type]||TT.ATP250;
      setDrawScreenData({bracket:liveBrkt,tourName:t.name,tourType:t.type,surface:t.surface,tierColor:tt2draw.color,tierLabel:tt2draw.label});
      setView("draw");
    }
    // Livello viaggio: 0=stesso torneo, 1=auto, 2=treno, 3=aereo+auto, 4=intercontinentale
    const travelLevel=getTravelLevel(lastTournName,t.name,pZone,tZone);
    const TRAVEL_DUR=[0,800,1200,1800,2500];
    const dur=TRAVEL_DUR[travelLevel]||1800;
    if(dur===0){
      // Stesso torneo (Slam multi-settimana): salta transizione
      triggerFlight(pZone,tZone,travelCost,jetLag,afterFlight);
      return;
    }
    const accom=getAccommodation(t.type,player.rank);
    const fromCity=lastTournName?getTourCity(lastTournName):pZone;
    const fromFlag=lastTournName?(TOUR_FLAG[lastTournName]||""):(ZONE_EMOJI[pZone]||"");
    const toCity=getTourCity(t.name);
    const toFlag=TOUR_FLAG[t.name]||"";
    setCityTransition({
      level:travelLevel,
      fromCity,fromFlag,fromZone:pZone,
      toCity,toFlag,toZone:tZone,
      tourName:t.name,tourType:t.type,
      tierColor:tt2.color,tierLabel:tt2.label,
      surface:t.surface,
      accom,duration:dur,
      afterFlight,pZone,tZone,travelCost,jetLag,
    });
  }

  function handleMatchDone(won,sets,domSets){
    // Guard: blocca doppia chiamata con ref dedicato (non usa newsFlash — quello è uno stato
    // indipendente che può essere attivo per eventi passati e causerebbe freeze)
    if(matchDoneInProgress.current) return;
    matchDoneInProgress.current=true;
    // Guard: activeTour null = stato inconsistente (save ricaricato a metà partita)
    if(!activeTour){matchDoneInProgress.current=false;setView("cal");return;}
    const{tt:tt2,totalRounds,liveKey}=activeTour;
    const r=tourRound;
    const fromEnd=totalRounds-1-r;
    const pmTblSize=(PRIZE_MONEY[activeTour.type]||[]).length;
    // Slam (8 slot): pfIdx = round direttamente; ITF (6 slot): formula rounds-based; altri (7 slot): formula fromEnd
    const pfIdx=pmTblSize>7
      ?(won&&fromEnd===0?pmTblSize-1:r)
      :pmTblSize===6
        ?(won&&fromEnd===0?5:(tt2.rounds-fromEnd))
        :(won?Math.max(0,6-fromEnd):Math.max(0,6-fromEnd-1));
    const prz=getMatchMoney(activeTour.type,tt2.prize,pfIdx);
    const pts=getMatchPts(activeTour.type,fromEnd,won);
    // Rank derivato dai punti totali aggiornati — coerente con scala reale ATP
    const newTotalPts=(player.atpPoints||0)+pts;
    const newRankFromPts=rankForAtpPts(newTotalPts);
    const rd=won?(newRankFromPts-(player.rank||500)):Math.ceil(pts/22);
    const setsPlayed=sets.length;
    // Resistenza riduce la fatica: ogni 5pt sopra 15 = -0.5% per set
    const resBonus=Math.max(0,((player.stats.resistenza||15)-15)/5)*0.5;
    const fatPerSet=Math.max(2, 6-resBonus);
    const fatGain=Math.round(setsPlayed*fatPerSet);
    const nr=r+1;
    const isExit=!won||(nr>=totalRounds);
    // Recupero -5% tra round: 1-2 giorni di riposo tra un match e il successivo in torneo
    const roundRecovery=(!isExit&&won)?5:0;
    // Calcola la nuova history con cap a 30 tornei (unità naturale di cancellazione)
    const _newHistEntry={week,year,tournament:activeTour.name,type:activeTour.type,surface:activeTour.surface,result:won?"V":"S",round:getRoundName(r,totalRounds),prize:isExit?prz:0,pts:isExit?pts:0,isExit,opp:{name:matchData.opp.name,rank:matchData.opp.rank,nat:matchData.opp.nat||""},sets:sets.map(s=>({pg:s.pg,og:s.og,w:s.w}))};
    const _histFull=[...(player.history||[]),_newHistEntry];
    const _cappedHist=(()=>{
      const MAX_TOURN=30;
      if(!isExit) return _histFull; // mid-torneo: non troncare mai
      const seen=[];const seenKeys=new Set();
      [..._histFull].reverse().forEach(h=>{
        const k=h.tournament+"_A"+h.year+"S"+h.week;
        if(!seenKeys.has(k)){seenKeys.add(k);seen.push(k);}
      });
      if(seen.length<=MAX_TOURN) return _histFull;
      const keepKeys=new Set(seen.slice(0,MAX_TOURN));
      return _histFull.filter(h=>keepKeys.has(h.tournament+"_A"+h.year+"S"+h.week));
    })();
    const np={...player,
      wins:won?player.wins+1:player.wins,
      losses:won?player.losses:player.losses+1,
      money:isExit?(player.money||0)+prz:(player.money||0),
      atpPoints:isExit?(player.atpPoints||0)+pts:(player.atpPoints||0),
      rank:isExit?clamp(newRankFromPts,1,500):player.rank,
      fatigue:clamp((player.fatigue||0)+fatGain-roundRecovery,0,100),
      history:_cappedHist
    };
    // titles only at final (see below)
    // Update live bracket to mark player match as done
    let brkt=null;
    if(liveKey&&brackets[liveKey]){
      brkt={...brackets[liveKey]};
      // 1. Aggiorna il match del giocatore nel turno corrente
      if(brkt.rounds[r]){
        const playerSurvivorObj=won?{...player,isPlayer:true,stats:player.stats}:null;
        brkt={...brkt,rounds:brkt.rounds.map((rd,i)=>i===r?{
          ...rd,
          matches:rd.matches.map(m=>m.isPlayerMatch?{...m,pending:false,winner:won?player.name:matchData.opp.name,wr:won?player.rank:matchData.opp.rank,sets,done:true}:m),
          survivors:rd.survivors.map(s=>s===null?playerSurvivorObj:s)
        }:rd)};
      }
      if(!won){
        brkt={...brkt,winner:matchData.opp.name,wr:matchData.opp.rank,completed:true};
      } else if(nr<totalRounds){
        // 2. Simula il turno successivo con i sopravvissuti aggiornati
        brkt=advanceLiveBracket(brkt,{...player,isPlayer:true},nr);
      }
      setBrackets(prev=>({...prev,[liveKey]:brkt}));
    }
    // Aggiorna morale: formula semplice — nextMorale = startMorale + shift
    // shift cattura tutto: tipo turno, win% teorica, differenza rank
    // finalMoraleInGame (andamento in-game) NON partecipa al calcolo finale:
    // serve solo a influenzare le probabilità durante la partita (via pStr)
    const startMorale=matchData?.startMorale!=null?matchData.startMorale:morale;
    const swp=domSets?.startWinPct!=null?domSets.startWinPct:50;
    const pwp=domSets?.pureWinPct!=null?domSets.pureWinPct:50;
    const domWon=(domSets&&domSets.domWon||0);
    const domLost=(domSets&&domSets.domLost||0);
    // domBonus cappato a ±1: evita feedback set_dominati→morale_alto→più_set_dominati
    const domBonus=clamp(domWon-domLost,-1,1);
    let nextMorale=startMorale;
    if(isExit||won){
      let shift=calcMoraleShift(won,isExit,r,totalRounds,matchData.opp.rank,np.rank,swp,startMorale,pwp);
      // Cap contestuale e smorzamento ora dentro calcMoraleShift (startMorale passato come param)
      // Floor soft: morale non scende mai sotto 8
      nextMorale=clamp(startMorale+shift+domBonus,8,100);
      setMorale(nextMorale);
    }
    setPlayer(np);
    if(!won){
      notify(`Eliminato al ${getRoundName(r,totalRounds)} — +€${fmt(prz)} · +${pts}pts`,"#f59e0b");
      setLastTournResult({round:r+1,totalRounds,week});
      setLastTournName(activeTour?.name||null);
      // Peso sconfitta basato su probabilità teorica pre-match (swp):
      // sfavorito (swp<40): perdere era atteso → decrementa il contatore
      // pari (40-60): accumulo lento, cap a 2 — la sconfitta è contestuale
      // favorito (>60): sconfitta inaspettata → incremento normale
      const newCL=swp>=60
        ?consecutiveLosses+1
        :swp>=40
          ?Math.min(consecutiveLosses+1,2)
          :Math.max(0,consecutiveLosses-1);
      setConsecutiveLosses(newCL);
      setConsecutiveTournaments(0);
      // Usa activeEvents corrente (snapshot locale) per evitare stale closure
      const activeEvtsSnap=[...activeEvents];
      const evtL=checkAndFireEvent(np,nextMorale,staff,year,week,newCL,0,activeEvtsSnap,false,catCooldown);
      if(evtL){
        const {pOut:pL,newMorale:nmL,addActive:aL,evtCat:ecL,newCooldown:ncL}=applyEvtEffect(evtL.id,np,nextMorale,staff);
        const newLogL=[...careerLog,{cat:evtL.cat,icon:evtL.icon,title:evtL.title,year:evtL.year,week:evtL.week}].slice(-20);
        setCareerLog(newLogL);
        if(ncL&&ecL) setCatCooldown(cd=>({...cd,[ecL]:ncL}));
        const updatedActiveEvts=aL?[...activeEvtsSnap,aL].slice(0,2):activeEvtsSnap;
        if(aL) setActiveEvents(updatedActiveEvts);
        if(nmL!==nextMorale) setMorale(nmL);
        {const slamSkipL=(activeTour?.type==="Slam"&&r>=3)?2:1;
        advanceWeek(pL,{round:r+1,totalRounds},nmL,updatedActiveEvts,slamSkipL);}
        matchDoneInProgress.current=false;
        setNewsFlash(evtL);
        // Mostra bracket update poi cal
        const _brktL=liveKey?brackets[liveKey]:null;
        const _tourL=activeTour;
        bracketUpdateCallback.current=()=>{setView("cal");};
        setBracketUpdateData({bracket:_brktL||brkt,completedRound:r,totalRounds,won:false,isExit:true,isTournEnd:true,tourName:_tourL.name,tourType:_tourL.type,tierColor:(TT[_tourL.type]||TT.ATP250).color,tierLabel:(TT[_tourL.type]||TT.ATP250).label});
        setView("bracketUpdate");
      } else {
        matchDoneInProgress.current=false;
        {const slamSkip=(activeTour?.type==="Slam"&&r>=3)?2:1;
        advanceWeek(np,{round:r+1,totalRounds},nextMorale,activeEvtsSnap,slamSkip);}
        // Mostra bracket update poi cal
        const _brktLE=liveKey?brackets[liveKey]:null;
        const _tourLE=activeTour;
        bracketUpdateCallback.current=()=>{setView("cal");};
        setBracketUpdateData({bracket:_brktLE||brkt,completedRound:r,totalRounds,won:false,isExit:true,isTournEnd:true,tourName:_tourLE.name,tourType:_tourLE.type,tierColor:(TT[_tourLE.type]||TT.ATP250).color,tierLabel:(TT[_tourLE.type]||TT.ATP250).label});
        setView("bracketUpdate");
      }
    } else {
      if(nr>=totalRounds){
        const npFinal={...np,titles:(np.titles||0)+1};
        setPlayer(npFinal);
        notify(`🏆 TITOLO! ${activeTour.name} — +€${fmt(prz)} · +${pts}pts`,"#f59e0b");
        // +5 titolo extra su nextMorale (che include già +20 da calcMoraleShift finale vinta)
        // Totale titolo: +25
        const titleMorale=clamp(nextMorale+5,0,100);
        setMorale(titleMorale);
        setLastTournResult({round:totalRounds,totalRounds,week});
        setLastTournName(activeTour?.name||null);
        setConsecutiveLosses(0);
        setConsecutiveTournaments(ct=>ct+1);
        const activeEvtsSnapT=[...activeEvents];
        const evtT=checkAndFireEvent(npFinal,titleMorale,staff,year,week,0,consecutiveTournaments+1,activeEvtsSnapT,false,catCooldown);
        if(evtT){
          const {pOut:pT,newMorale:nmT,addActive:aT,evtCat:ecT,newCooldown:ncT}=applyEvtEffect(evtT.id,npFinal,titleMorale,staff);
          const newLogT=[...careerLog,{cat:evtT.cat,icon:evtT.icon,title:evtT.title,year:evtT.year,week:evtT.week}].slice(-20);
          setCareerLog(newLogT);
          if(ncT&&ecT) setCatCooldown(cd=>({...cd,[ecT]:ncT}));
          const updatedActiveEvtsT=aT?[...activeEvtsSnapT,aT].slice(0,2):activeEvtsSnapT;
          if(aT) setActiveEvents(updatedActiveEvtsT);
          if(nmT!==titleMorale) setMorale(nmT);
          // advanceWeek PRIMA, banner nel calendario DOPO
          {const slamSkipTE=(activeTour?.type==="Slam")?2:1;
          advanceWeek(pT,{round:totalRounds,totalRounds},nmT,updatedActiveEvtsT,slamSkipTE);}
          matchDoneInProgress.current=false;
          setNewsFlash(evtT);
          // Mostra bracket update titolo poi cal
          const _brktTE=liveKey?brackets[liveKey]:null;
          const _tourTE=activeTour;
          bracketUpdateCallback.current=()=>{setView("cal");};
          setBracketUpdateData({bracket:_brktTE||brkt,completedRound:r,totalRounds,won:true,isExit:true,isTournEnd:true,tourName:_tourTE.name,tourType:_tourTE.type,tierColor:(TT[_tourTE.type]||TT.ATP250).color,tierLabel:(TT[_tourTE.type]||TT.ATP250).label});
          setView("bracketUpdate");
        } else {
          matchDoneInProgress.current=false;
          {const slamSkipT=(activeTour?.type==="Slam")?2:1;
          advanceWeek(npFinal,{round:totalRounds,totalRounds},titleMorale,activeEvtsSnapT,slamSkipT);}
          // Mostra bracket update titolo poi cal
          const _brktTN=liveKey?brackets[liveKey]:null;
          const _tourTN=activeTour;
          bracketUpdateCallback.current=()=>{setView("cal");};
          setBracketUpdateData({bracket:_brktTN||brkt,completedRound:r,totalRounds,won:true,isExit:true,isTournEnd:true,tourName:_tourTN.name,tourType:_tourTN.type,tierColor:(TT[_tourTN.type]||TT.ATP250).color,tierLabel:(TT[_tourTN.type]||TT.ATP250).label});
          setView("bracketUpdate");
        }
      } else {
        setTourRound(nr);
        // Estrae avversario dal bracket GIA' aggiornato (brkt, non brackets[liveKey] che e' stale)
        const playerMatchNr=brkt?.rounds[nr]?.matches?.find(m=>m.isPlayerMatch);
        const opp2=playerMatchNr?(playerMatchNr.p1obj?.isPlayer?playerMatchNr.p2obj:playerMatchNr.p1obj)||getOppForRound(np.rank,activeTour.type,nr):getOppForRound(np.rank,activeTour.type,nr);
        const roundName=getRoundName(nr,totalRounds);
        // Fix caso 3: opp2 non deve mai essere undefined
        const safeOpp2=opp2||getOppForRound(np.rank,activeTour.type,nr)||getATPPlayer(world,Math.min(400,np.rank+10));
        setMatchData({tourn:activeTour,opp:safeOpp2,bestOf:activeTour.type==="Slam"?5:3,round:nr,tt:tt2,totalRounds,startMorale:nextMorale,entryCosts:matchData?.entryCosts});
        setMatchKey(k=>k+1);
        matchDoneInProgress.current=false;
        notify(`✅ Avanzato — ${roundName}!`,"#10b981");
        // Mostra bracket update poi prossimo match
        const _brktWI=brkt;
        const _tourWI=activeTour;
        const _nextView=view==="match"?"matchnext":"match";
        bracketUpdateCallback.current=()=>{setView(_nextView);};
        setBracketUpdateData({bracket:_brktWI,completedRound:r,totalRounds,won:true,isExit:false,isTournEnd:false,tourName:_tourWI.name,tourType:_tourWI.type,tierColor:(TT[_tourWI.type]||TT.ATP250).color,tierLabel:(TT[_tourWI.type]||TT.ATP250).label});
        setView("bracketUpdate");
      }
    }
  }

  function handleWinterConfirm({allocation, restSlots}){
    const WINTER_WEEKS = 8;
    const coachLv = getStaffLevel(staff,"coach");
    const prepLv  = getStaffLevel(staff,"prep");
    let ns = {...player.stats};
    const fatStart = player.fatigue||0;
    let newMorale = morale;

    // ── SALDO NETTO FATICA ─────────────────────────────────
    // Calcola delta totale allenamenti (con prepMult se presente)
    const prepMult = prepLv ? prepLv.fatigueReduce : 1.0;
    let fatDeltaTrain = 0;
    TRAIN.forEach(o=>{
      if(o.id==="rst") return;
      const count = allocation[o.id]||0;
      if(count===0) return;
      // Ogni slot di allenamento aggiunge fatica (ridotta dal prep se ha fat>0)
      const slotFat = o.fat>0 ? Math.round(o.fat*prepMult) : o.fat;
      fatDeltaTrain += slotFat * count;
    });
    // Riposo: -45 per slot
    const fatDeltaRest = restSlots * (-45);
    // Recupero automatico pausa: -8/sett × 8 sett
    const fatDeltaPausa = -64;
    // Fatica finale = saldo netto, clampata 0-100
    const fatFinal = clamp(fatStart + fatDeltaTrain + fatDeltaRest + fatDeltaPausa, 0, 100);

    // ── GAIN STATISTICHE ──────────────────────────────────
    TRAIN.forEach(o=>{
      if(o.id==="rst") return;
      const count = allocation[o.id]||0;
      if(count===0) return;
      for(let i=0;i<count;i++){
        const coachMult = coachLv && o.stat ? coachLv.trainBonus : 1.0;
        const curStat = o.stat?(ns[o.stat]||0):0;
        // Fix1: dimFactor curva concava ^0.6
        const dimFactor = o.stat ? Math.max(0.15,Math.pow(Math.max(0,(35-curStat)/35),0.6)) : 1.0;
        // Fix3: capFactor coach
        const coachLvNumW = coachLv?(coachLv.lv||1)-1:0;
        const coachCapBaseW = {0:13,1:19,2:25,3:32}[coachLvNumW]||13;
        const isMentaleW = o.stat==="mentale";
        const isAtleW = o.stat==="velocita"||o.stat==="resistenza";
        const mentalLvW = getStaffLevel(staff,"mental");
        const coachCapW = coachCapBaseW+(isMentaleW&&mentalLvW?3:0)+(isAtleW&&prepLv?2:0);
        const capFactorW = o.stat?Math.max(0,Math.min(1,(coachCapW-curStat+3)/3)):1.0;
        const gain = parseFloat((rng(o.gain[0]*coachMult,o.gain[1]*coachMult)*dimFactor*capFactorW).toFixed(2));
        if(o.stat) ns[o.stat] = parseFloat(clamp((ns[o.stat]||0)+gain,1,35).toFixed(2));
      }
    });

    // ── MORALE ────────────────────────────────────────────
    // Riposo: +4 per slot; pausa boost: +2/sett × 8
    newMorale = clamp(newMorale + restSlots*4 + 16, 0, 100);

    // ── COSTO ECONOMICO ───────────────────────────────────
    function lcPausa(rank){const base=rank>350?55:rank>300?75:rank>250?95:rank>200?120:rank>150?155:rank>100?200:rank>50?280:420;return Math.round(base*0.6);}
    const staffCostWeek = getStaffWeeklyCost(staff);
    const totalCost = (lcPausa(player.rank||500)+staffCostWeek)*WINTER_WEEKS;
    const newMoney = (player.money||0) - totalCost;

    // ── DECAY STAT ────────────────────────────────────────
    const decayStats = {...ns};
    // Decay lieve (8 sett x -0.05 su stat random)
    for(let i=0;i<8;i++){
      const dKey = STAT_KEYS[Math.floor(Math.random()*STAT_KEYS.length)];
      decayStats[dKey] = parseFloat(Math.max(1,(decayStats[dKey]||1)-0.05).toFixed(2));
    }
    // Fix2: decay fisico età bulk (8 settimane condensate)
    const physioLvWin=getStaffLevel(staff,"physio");
    const ageWin=player.age||17;
    const ageDecayWin=(()=>{
      if(ageWin<28) return 0;
      if(ageWin<30) return 0.10;
      if(ageWin<32) return 0.25;
      if(ageWin<34) return 0.50;
      if(ageWin<36) return 0.80;
      if(ageWin<38) return 1.20;
      return 1.80;
    })();
    if(ageDecayWin>0&&!physioLvWin){
      const PHYS_STATS_W=["servizio","dritto","rovescio","volee","velocita","resistenza"];
      const decayPerStatWin=ageDecayWin*8/52/PHYS_STATS_W.length;
      PHYS_STATS_W.forEach(sk=>{
        decayStats[sk]=parseFloat(Math.max(1,(decayStats[sk]||1)-decayPerStatWin).toFixed(2));
      });
    }

    const updPlayer = {...player, stats:decayStats, fatigue:Math.round(fatFinal), money:newMoney};
    setPlayer(updPlayer);
    setMorale(clamp(newMorale,0,100));
    setWinterDone(true);
    setWeek(50);
    setTrainCount(0);
    setWeekDone(false);
    notify(`❄️ Pausa invernale completata! Fatica: ${fatStart}% → ${Math.round(fatFinal)}% — −€${totalCost.toLocaleString("it-IT")}`, "#3b82f6");
    setView("cal");
  }

  function handleTrain(opt){
    const coachLv=getStaffLevel(staff,"coach");
    const prepLv=getStaffLevel(staff,"prep");
    const coachMult=coachLv&&opt.stat?coachLv.trainBonus:1.0;
    const prepMult=prepLv&&opt.fat>0?prepLv.fatigueReduce:1.0;
    // Morale basso riduce gain allenamento (sotto 40: -20%, sotto 20: -40%)
    const moraleTrainFactor=morale<20?0.60:morale<35?0.80:1.0;
    // Fix1: dimFactor curva concava ^0.6 — gain visibile anche a stat alte
    const curStat=opt.stat?(player.stats[opt.stat]||0):0;
    const dimFactor=opt.stat?Math.max(0.15,Math.pow(Math.max(0,(35-curStat)/35),0.6)):1.0;
    // Fix3: capFactor coach — gain crolla sopra soglia del coach attivo
    const coachLvNum=coachLv?(coachLv.lv||1)-1:0;
    const coachCapBase={0:13,1:19,2:25,3:32}[coachLvNum]||13;
    const isMentale=opt.stat==="mentale";
    const isAtle=opt.stat==="velocita"||opt.stat==="resistenza";
    const mentalLv=getStaffLevel(staff,"mental");
    const prepLvCap=getStaffLevel(staff,"prep");
    const coachCap=coachCapBase+(isMentale&&mentalLv?3:0)+(isAtle&&prepLvCap?2:0);
    const capFactor=opt.stat?Math.max(0,Math.min(1,(coachCap-curStat+3)/3)):1.0;
    const baseGain=rng(opt.gain[0]*coachMult*moraleTrainFactor,opt.gain[1]*coachMult*moraleTrainFactor);
    const gain=parseFloat((baseGain*dimFactor*capFactor).toFixed(2));
    const fatChange=opt.fat>0?Math.round(opt.fat*prepMult):opt.fat;
    const ns={...player.stats};
    if(opt.stat)ns[opt.stat]=parseFloat(clamp((ns[opt.stat]||0)+gain,1,35).toFixed(2));
    // Riposo: moraleGain contestuale — aiuta chi ne ha bisogno, non chi è già euforico
    // morale<30:+5 | 30-50:+3 | 50-65:+2 | 65-80:+1 | >80:+0
    const baseRecovery=opt.moraleGain||0;
    const moraleRecovery=baseRecovery>0
      ?(morale<30?5:morale<50?3:morale<65?2:morale<80?1:0)
      :0;
    const newMorale=moraleRecovery>0?Math.min(100,morale+moraleRecovery):morale;
    if(moraleRecovery>0)setMorale(newMorale);
    const updatedPlayer={...player,stats:ns,fatigue:clamp((player.fatigue||0)+fatChange,0,100)};
    setPlayer(updatedPlayer);
    setTrainCount(c=>c+1);
    if(opt.id==="rst"){
      const moraleMsg=moraleRecovery>0?" · Morale +"+(moraleRecovery)+" (→"+newMorale+")":" · Morale invariato (già "+morale+")";
      notify("😴 Riposo — fatica ridotta"+moraleMsg,"#3b82f6");
    }
    else notify("Sessione "+opt.label+": +"+gain+" pt | Fatica "+(fatChange>0?"+":"")+fatChange+"%");
  }

  function handleTrainFinish(){
    const activeEvtsSnap=[...activeEvents];
    const evt=checkAndFireEvent(player,morale,staff,year,week,consecutiveLosses,consecutiveTournaments,activeEvtsSnap,true,catCooldown);
    if(evt){
      const {pOut,newMorale,addActive,evtCat:ec,newCooldown:nc}=applyEvtEffect(evt.id,player,morale,staff);
      const newLog=[...careerLog,{cat:evt.cat,icon:evt.icon,title:evt.title,year:evt.year,week:evt.week}].slice(-20);
      setCareerLog(newLog);
      if(nc&&ec) setCatCooldown(cd=>({...cd,[ec]:nc}));
      const updatedActiveEvts=addActive?[...activeEvtsSnap,addActive].slice(0,2):activeEvtsSnap;
      if(addActive) setActiveEvents(updatedActiveEvts);
      if(newMorale!==morale) setMorale(newMorale);
      advanceWeek(pOut,null,null,updatedActiveEvts);
      setTrainCount(0);
      setNewsFlash(evt);
      setView("cal");
    } else {
      advanceWeek(player,null,null,activeEvtsSnap);
      setTrainCount(0);
      setView("cal");
    }
  }

        {/* ── CLASSIFICA ── */}
        {view==="ranking"&&(()=>{
          // Lista unificata player+NPC ordinata per punti reali decrescenti
          const playerEntry={id:"__player__",rank:player.rank||500,name:player.name,
            nat:(()=>{const n=NATS.find(x=>x.n===(player.nationality||"Italia")||(x.c===player.nationality));return n?n.f:player.nationality||"🇮🇹";})(),
            age:player.age||(player.startAge||17),atpPoints:player.atpPoints||0,isPlayer:true};
          const allSorted=[...Object.values(world).map(p=>({...p,isPlayer:false})),playerEntry]
            .sort((a,b)=>(b.atpPoints||0)-(a.atpPoints||0)||((a.rank||999)-(b.rank||999)));
          allSorted.forEach((p,i)=>{p.displayRank=i+1;});
          const top30=allSorted.slice(0,30);
          // Posizione REALE del giocatore nella lista ordinata per punti (1-indexed)
          const pIdx=allSorted.findIndex(p=>p.isPlayer);
          const pRealPos=pIdx+1; // posizione reale in classifica per punti
          const pRank=player.rank||500;
          const isInTop30=pRealPos<=30;
          // Giocatore fuori classifica: 0 punti o meno del minimo NPC
          const minNpcPts=Math.min(...Object.values(world).map(p=>p.atpPoints||0));
          const playerOutOfRanking=(player.atpPoints||0)===0||(player.atpPoints||0)<minNpcPts;
          // Vista "intorno a me": finestra ±10 centrata sulla posizione REALE in lista
          const windowList=(()=>{
            const start=Math.max(0,pIdx-10);
            const end=Math.min(allSorted.length-1,pIdx+10);

          })();
          const renderRow=(p,realIdx)=>{
            const isMe=p.isPlayer;
            // Per il giocatore fuori classifica mostriamo "FC" invece del numero
            const dr=isMe&&playerOutOfRanking?"FC":p.displayRank||p.rank;
            const drLabel=dr==="FC"?"FC":`#${dr}`;

                <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:800,fontSize:13,color:medalCol,minWidth:36}}>{drLabel}</span>

                <span style={{fontSize:12,fontFamily:"'Rajdhani',sans-serif",fontWeight:isMe?800:600,color:isMe?"#f59e0b":"#64748b"}}>{fmt(Math.round(p.atpPoints||0))}</span>

          const winEndPos=Math.min(allSorted.length,pRealPos+10);
          const listTitle=showAround
            ?playerOutOfRanking?"📍 Fuori classifica — ultimi 20":`📍 Intorno a te — #${winStartPos} / #${winEndPos}`

          return(
            <div>
              {/* Rigenera ATP Rankings — ricalibra curva per fascia + pool + rank */}
              {(()=>{
                const currentPool=Object.values(world).reduce((s,p)=>s+(p.atpPoints||5),0);
                const targetPool=Object.values(world).reduce((s,p)=>s+atpPtsForRank(p.rank||400),0);
                const poolPct=(currentPool-targetPool)/Math.max(targetPool,1)*100;
                const realRankNow=Object.values(world).filter(p=>(p.atpPoints||0)>(player.atpPoints||0)).length+1;
                const rankDrift=realRankNow-(player.rank||500);
                const npcCount=Object.keys(world).length;
                return(
                  <button onClick={()=>{
                    // Step 1: assicura 500 NPC
                    const base=migrateWorldPool(world);
                    // Step 2: remap per fascia — blend tra valore reale e teorico
                    // Riporta la forma della curva vicino al teorico senza azzerare le variazioni
                    const sorted=Object.values(base).sort((a,b)=>(b.atpPoints||5)-(a.atpPoints||5));
                    const getAlpha=rank=>{
                      if(rank<=15)  return 0.85; // top: troppo deflati, riporta al teorico
                      if(rank<=50)  return 0.70;
                      if(rank<=200) return 0.75; // fascia media: troppo inflata, abbassa
                      if(rank<=400) return 0.55;
                      return 0.20;               // fondo: già ok
                    };
                    const remapped=sorted.map((p,i)=>{
                      const rank=i+1;
                      const teo=atpPtsForRank(rank);
                      const real=p.atpPoints||5;
                      const alpha=getAlpha(rank);
                      return {...p,rank,atpPoints:Math.max(5,Math.round(teo*alpha+real*(1-alpha)))};
                    });
                    // Step 3: normalizza al pool target
                    const poolAfter=remapped.reduce((s,p)=>s+(p.atpPoints||5),0);
                    const factor=poolAfter>0?targetPool/poolAfter:1;
                    const normalized=remapped.map(p=>({...p,atpPoints:Math.max(5,Math.round((p.atpPoints||5)*factor))}));
                    // Step 4: ricostruisci world keyed by rank
                    const newWorld={};
                    normalized.forEach(p=>{newWorld[p.rank]={...p};});
                    setWorld(newWorld);
                    // Step 5: sync rank giocatore
                    const newRealRank=normalized.filter(p=>(p.atpPoints||0)>(player.atpPoints||0)).length+1;
                    setPlayer(p=>({...p,rank:clamp(newRealRank,1,500)}));
                    notify("✅ Classifica ATP ricalibrata","#10b981");

                    </div>
                  </button>

                      <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:800,fontSize:13,color:"#f59e0b"}}>
                        👤 {playerOutOfRanking?"FC":"#"+pRealPos} — {fmt(Math.round(player.atpPoints||0))} pts
                      </span>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })()}

        {/* ── STORICO ── */}
        {view==="history"&&(()=>{

          const ROUND_RANK={"T1":0,"Turno 1":0,"Turno 2":1,"T2":1,"Ottavi":2,"Ottavi di Finale":2,"QF":3,"Quarti":3,"Quarti di Finale":3,"SF":4,"Semifinale":4,"Finale":5,"Titolo":6};
          const rRank=s=>ROUND_RANK[s]??0;
          // Categorie ordinate per prestigio
          const CATS=["Slam","M1000","ATP500","ATP250","ChallengerA","ChallengerB","ITF"];
          const CAT_LABEL={"Slam":"SLAM","M1000":"M1000","ATP500":"ATP500","ATP250":"ATP250","ChallengerA":"CHALL A","ChallengerB":"CHALL B","ITF":"ITF"};
          // Tab: "matches" | "stats" — histTab e' useState top-level
          // Aggregazione per categoria
          const statsByCat=CATS.map(cat=>{

            const tourns_played=new Set(entries.map(h=>h.tournament+"_A"+h.year+"S"+h.week)).size;

            const titles=entries.filter(h=>h.round==="Titolo"||h.round==="Finale"&&h.result==="V").length;
            // Miglior turno raggiunto (tra tutte le partite VINTE o risultato finale del torneo)

            // Per ogni torneo: il turno più alto raggiunto
            const tournSummaries=Object.values(byTourn).map(t=>{
              // Ultima partita giocata in quel torneo

              // Se la partita è vinta ed è una finale → titolo

              return{round:roundLabel,year:t.year,week:t.week,name:t.name,rr:rRank(roundLabel)};
            });
            // Miglior turno
            const bestRR=Math.max(...tournSummaries.map(t=>t.rr));

            const totalPrize=entries.reduce((s,h)=>s+(h.prize||0),0);

                ):statsByCat.map((s,i)=>{
                  const winPct=s.wins+s.losses>0?Math.round(s.wins/(s.wins+s.losses)*100):0;
                  const catColor=s.tt2?.color||"#64748b";

                        <div style={{textAlign:"right"}}>
                          <span style={{fontSize:14,color:"#10b981",fontWeight:800,fontFamily:"'Rajdhani',sans-serif"}}>{s.totalPts}pts</span>
                          <span style={{fontSize:13,color:"#334155"}}> · </span>
                          <span style={{fontSize:14,color:"#f59e0b",fontWeight:800,fontFamily:"'Rajdhani',sans-serif"}}>€{fmt(s.totalPrize)}</span>

                      {/* Griglia stats */}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>

                          <div style={{fontSize:11,color:"#7a9ab8",fontWeight:800,letterSpacing:1,marginBottom:5,textTransform:"uppercase"}}>V / S</div>
                          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:22,lineHeight:1}}>

                            <span style={{color:"#ef4444"}}>{s.losses}</span>

                          <div style={{fontSize:11,color:"#7a9ab8",fontWeight:800,letterSpacing:1,marginBottom:5,textTransform:"uppercase"}}>TITOLI</div>
                          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:24,lineHeight:1,color:s.titles>0?"#f59e0b":"#1e3a5f"}}>{s.titles>0?s.titles:"–"}</div>

                        </div>
                        {/* Match */}
                        <div style={{background:"#0a1525",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                          <div style={{fontSize:11,color:"#7a9ab8",fontWeight:800,letterSpacing:1,marginBottom:5,textTransform:"uppercase"}}>MATCH</div>
                          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:24,lineHeight:1,color:"#e2e8f0"}}>{s.wins+s.losses}</div>
                          <div style={{fontSize:12,color:"#475569",fontWeight:600,marginTop:4}}>giocati</div>
                        </div>
                      </div>

                      {/* Miglior turno */}
                      <div style={{background:"#060d18",borderRadius:10,padding:"11px 14px",border:`1px solid ${bestCol}22`}}>
                        <div style={{fontSize:11,color:"#475569",fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Miglior risultato</div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                            <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:900,fontSize:24,color:bestCol,letterSpacing:0.5}}>{s.bestRoundLabel}</span>
                            <span style={{fontSize:14,color:"#64748b",fontWeight:700}}>×{s.bestCount}</span>
                          </div>
                          {s.firstBest&&(
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:2}}>1ª volta</div>
                              <div style={{fontSize:13,color:"#b0bfd0",fontWeight:700}}>A{s.firstBest.year} S{s.firstBest.week}</div>
                              <div style={{fontSize:11,color:"#64748b",maxWidth:120,textAlign:"right",marginTop:1}}>{s.firstBest.name}</div>
                            </div>
                          )}
                        </div>
                      </div>
                    </Card>
                  );
                })}
              </div>
            )}
          </div>
          );
        })()}

        {/* ── PROFILO ── */}
        {view==="profile"&&(()=>{
          const rh=player.rankHistory||[];
          const sparkW=300,sparkH=120;
          // Includi rank corrente come punto live
          const rhFull=[...rh,{w:week,y:year,r:player.rank}];
          const rhPlot=rh.length>0&&rh[rh.length-1].w===week&&rh[rh.length-1].y===year?rh:rhFull;
          // Best assoluto di carriera: usa campo persistente se disponibile, fallback su finestra visibile
          const bestR=Math.min(player.bestRankEver||500,...rhPlot.map(x=>x.r));
          // Inizio carriera: usa campo persistente careerStartRank (sempre #400 salvo migrazione)
          const careerStart=player.careerStartRank||400;
          // Inizio anno corrente: primo punto in rhPlot con y===year, fallback careerStart
          const yearStartEntry=rhPlot.find(x=>x.y===year);
          const startR=yearStartEntry?yearStartEntry.r:careerStart;
          const startYear=yearStartEntry?yearStartEntry.y:year;
          const curR=player.rank;
          const prevR=rhPlot.length>1?rhPlot[rhPlot.length-2].r:curR;
          // Y: rank 1 → cy=PAD (alto), rank 400 → cy=sparkH-PAD-XPAD (basso)
          const PAD=12,XPAD=14;
          // Scala power 0.40
          const rankToCy=r=>PAD+(Math.pow((Math.max(1,r)-1)/399,0.40))*(sparkH-PAD*2-XPAD);
          // X: lascia 16px a sx per etichette asse Y, 8px a dx
          const xLeft=16,xRight=sparkW-8;
          // Smoothing media mobile 3 punti: riduce rumore settimanale NPC
          const smoothed=rhPlot.map((x,i2,arr)=>{
            const prev=arr[i2-1]?arr[i2-1].r:x.r;
            const next=arr[i2+1]?arr[i2+1].r:x.r;
            // Ai bordi: peso maggiore sul punto stesso
            const sr=i2===0||i2===arr.length-1?x.r:Math.round((prev+x.r*2+next)/4);
            return{...x,sr};
          });
          const pts=smoothed.map((x,i2)=>({
            cx:smoothed.length>1?xLeft+(i2/(smoothed.length-1))*(xRight-xLeft):sparkW/2,
            cy:rankToCy(x.sr),
            w:x.w,y:x.y,r:x.r
          }));
          const pathD=pts.length>1?"M"+pts.map(p=>p.cx.toFixed(1)+","+p.cy.toFixed(1)).join(" L"):"";
          const trendUp=curR<prevR,trendDown=curR>prevR;
          const trendLabel=trendUp?"📈 in salita":trendDown?"📉 in calo":"➡️ stabile";
          const trendCol=trendUp?"#10b981":trendDown?"#ef4444":"#94a3b8";
          const deltaVsCareer=careerStart-curR;
          // Anno scorso stessa settimana
          const prevYearSameWeek=(rh||[]).find(x=>x.y===year-1&&x.w===week);
          // Soglie rilevanti
          // Soglie basate sulle regole reali del gioco (TT):
          // Non "accesso al tier" (già visibile nel calendario) ma
          // traguardi di carriera con impatto concreto sul gameplay
          const SOGLIE=[
            {r:315,label:"ATP 250",col:"#10b981",
             desc:"Accesso al circuito ATP principale",
             check:r=>r<=315},
            {r:150,label:"ATP 500",col:"#3b82f6",
             desc:"Accesso agli ATP 500 — draw più duri, montepremi triplo",
             check:r=>r<=150},
            {r:100,label:"Masters 1000",col:"#8b5cf6",
             desc:"Accesso ai Masters 1000 — elite del circuito",
             check:r=>r<=100},
            {r:50, label:"Top 50",col:"#f97316",
             desc:"Sponsor premium sbloccati, wild card Slam",
             check:r=>r<=50},
            {r:20, label:"Top 20",col:"#f59e0b",
             desc:"Elite ATP — seed fisso negli Slam",
             check:r=>r<=20},
            {r:10, label:"Top 10",col:"#ef4444",
             desc:"Top 10 mondiale",
             check:r=>r<=10},
          ];
          // Prossima soglia: prima che non hai ancora raggiunto
          const nextMilestone=SOGLIE.find(s=>!s.check(curR));
          const distToNext=nextMilestone?curR-nextMilestone.r:null;
          // Anno migliore per stagione
          const yearMap={};
          rhPlot.forEach(x=>{if(!yearMap[x.y]||x.r<yearMap[x.y])yearMap[x.y]=x.r;});
          // Tick asse X: cambi di anno nei dati + settimana corrente
          const xTicks=(()=>{
            const ticks=[];
            // Segna i punti dove cambia l'anno
            for(let i=1;i<rhPlot.length;i++){
              if(rhPlot[i].y!==rhPlot[i-1].y){
                ticks.push({cx:pts[i].cx,label:"A"+rhPlot[i].y,type:"year"});
              }
            }
            // Aggiungi settimana corrente come ultimo tick
            if(pts.length>0) ticks.push({cx:pts[pts.length-1].cx,label:"S"+week,type:"now"});
            // Aggiungi primo punto se non gia' coperto
            if(pts.length>0&&!ticks.find(t=>Math.abs(t.cx-pts[0].cx)<4)){
              ticks.unshift({cx:pts[0].cx,label:"S"+rhPlot[0].w,type:"start"});
            }
            return ticks;
          })();
          // ── Punti da difendere: raggruppa per settimana futura ──
          const defend=(year>1)?(()=>{
            const map={};
            (player.history||[]).filter(h=>h.isExit&&h.pts>0&&h.year===year-1&&h.week>week).forEach(h=>{
              if(!map[h.week])map[h.week]={week:h.week,pts:0,tournaments:[]};
              map[h.week].pts+=h.pts;
              map[h.week].tournaments.push({name:h.tournament,pts:h.pts,round:h.round,type:h.type});
            });
            return Object.values(map).sort((a,b)=>a.week-b.week);
          })():[];
          const totalDefend=defend.reduce((s,d)=>s+d.pts,0);
          return(
          <>
          <Card style={{marginBottom:14}}>
            <div style={{textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:44,marginBottom:4}}>🎾</div>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:24,letterSpacing:0.5}}>{player.name}</div>
              <div style={{color:"#94a3b8",fontSize:13,marginTop:2}}>{(()=>{const n=NATS.find(x=>x.n===(player.nationality||"Italia")||(x.c===player.nationality));return n?n.f+" "+n.c:player.nationality||"🇮🇹";})()}{" · "}{player.age||(player.startAge||17)} anni</div>
              <div style={{fontSize:14,color:"#f59e0b",fontWeight:700,marginTop:4}}>{getRankLabel(player.rank)}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[{l:"Ranking",v:rankDisplay(player),i:"🏆"},{l:"Punti ATP",v:fmt(Math.round(player.atpPoints||0)),i:"⭐"},{l:"Vittorie",v:player.wins,i:"✅"},{l:"Sconfitte",v:player.losses,i:"❌"},{l:"Titoli",v:player.titles||0,i:"🥇"},{l:"Guadagni",v:"€"+fmt(player.money||0),i:"💰"}].map((c,i2)=>(
                <div key={i2} style={{background:"#0f172a",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:20}}>{c.i}</div>
                  <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:16,marginTop:2}}>{c.v}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{c.l}</div>
                </div>
              ))}
            </div>

            {/* ── GRAFICO RANKING ── */}
            <div style={{background:"#060d18",borderRadius:10,padding:"12px 14px",border:"1px solid #1e293b",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:800,color:"#94a3b8",letterSpacing:0.5}}>📈 ANDAMENTO RANKING</span>
                <span style={{fontSize:12,color:trendCol,fontWeight:700}}>{trendLabel}</span>
              </div>
              <svg viewBox={"0 0 "+sparkW+" "+sparkH} width="100%" style={{display:"block",overflow:"visible",marginBottom:6}}>
                <defs>
                  <linearGradient id="rankGrad2" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#f59e0b" stopOpacity="0.0"/>
                    <stop offset="100%" stopColor="#f59e0b" stopOpacity="0.18"/>
                  </linearGradient>
                </defs>
                {/* Etichette asse Y: 1 in cima, 400 in fondo — opzione B: a sinistra, brevi */}
                <text x="0" y={PAD+4} fontSize="8" fill="#334155" fontFamily="Rajdhani,sans-serif">#1</text>
                <text x="0" y={sparkH-PAD-XPAD+4} fontSize="8" fill="#334155" fontFamily="Rajdhani,sans-serif">#400</text>
                {/* Linee soglia: etichette a SINISTRA, non sovrapposte alla linea — opzione B */}
                {SOGLIE.map(s=>{
                  const sy=rankToCy(s.r);
                  return(
                    <g key={s.r}>
                      <line x1={xLeft} y1={sy} x2={xRight} y2={sy} stroke={s.col} strokeWidth="0.7" strokeDasharray="3,5" opacity="0.45"/>
                      <text x={xLeft+2} y={sy-2} fontSize="6.5" fill={s.col} textAnchor="start" opacity="0.85" fontFamily="Rajdhani,sans-serif" fontWeight="700">{s.label}</text>
                    </g>
                  );
                })}
                {/* Linea orizzontale anno scorso stessa settimana */}
                {prevYearSameWeek&&(()=>{
                  const py=rankToCy(prevYearSameWeek.r);
                  return(
                    <g>
                      <line x1={xLeft} y1={py} x2={xRight} y2={py} stroke="#475569" strokeWidth="1" strokeDasharray="4,4" opacity="0.6"/>
                      <text x={xRight-2} y={py-3} fontSize="7" fill="#64748b" textAnchor="end" fontFamily="Rajdhani,sans-serif">A{year-1} S{week} #{prevYearSameWeek.r}</text>
                    </g>
                  );
                })()}
                {/* Area fill */}
                {pts.length>1&&(
                  <path d={pathD+" L"+pts[pts.length-1].cx.toFixed(1)+","+(sparkH-PAD-XPAD)+" L"+pts[0].cx.toFixed(1)+","+(sparkH-PAD-XPAD)+" Z"} fill="url(#rankGrad2)"/>
                )}
                {/* Linea principale */}
                {pts.length>1&&<path d={pathD} fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>}
                {/* Punto corrente */}
                {pts.length>0&&<circle cx={pts[pts.length-1].cx} cy={pts[pts.length-1].cy} r="4" fill="#f59e0b" stroke="#060d18" strokeWidth="2"/>}
                {/* Label rank corrente accanto al punto */}
                {pts.length>0&&<text x={pts[pts.length-1].cx} y={pts[pts.length-1].cy-7} fontSize="8" fill="#f59e0b" textAnchor="middle" fontFamily="Rajdhani,sans-serif" fontWeight="800">#{curR}</text>}
                {/* Best rank assoluto di carriera: marker verde, solo se diverso dal corrente */}
                {(()=>{
                  if(bestR===curR) return null;

                  if(bIdx<0) return null;
                  return(<g>
                    <circle cx={pts[bIdx].cx} cy={pts[bIdx].cy} r="3.5" fill="#10b981" stroke="#060d18" strokeWidth="1.5"/>
                    <text x={pts[bIdx].cx} y={pts[bIdx].cy-7} fontSize="8" fill="#10b981" textAnchor="middle" fontFamily="Rajdhani,sans-serif" fontWeight="800">#{bestR}</text>

                {xTicks.map((t,ti)=>(

                    <text x={t.cx} y={sparkH-1} fontSize="7" fill={t.type==="now"?"#f59e0b":"#475569"} textAnchor="middle" fontFamily="Rajdhani,sans-serif" fontWeight={t.type==="now"?"800":"400"}>{t.label}</text>
                  </g>

                <line x1={xLeft} y1={sparkH-XPAD+1} x2={xRight} y2={sparkH-XPAD+1} stroke="#1e293b" strokeWidth="0.8"/>
              </svg>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:8}}>
                <div style={{background:"#0f172a",borderRadius:7,padding:"5px 6px",textAlign:"center"}}>
                  <div style={{fontSize:12,color:"#64748b",fontWeight:600,marginBottom:1}}>Inizio A{startYear}</div>

                  <div style={{fontSize:12,color:"#f59e0b",fontWeight:700,marginBottom:1}}>Δ carriera</div>
