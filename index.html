// WINTER BLOCK SCREEN — Pausa invernale condensata (sett 42-49)
// ════════════════════════════════════════════════════════════
function WinterBlockScreen({player, staff, week, year, onConfirm, morale}){
  // 8 settimane condensate x 3 slot = 24 slot totali da distribuire
  const WINTER_WEEKS = 8; // sett 42-49
  const SLOTS_PER_WEEK = 3;
  const TOTAL_SLOTS = WINTER_WEEKS * SLOTS_PER_WEEK; // 24

  const TRAIN_OPTS = TRAIN.filter(o => o.id !== "rst");
  const ALL_OPTS = TRAIN; // include riposo

  const [allocation, setAllocation] = React.useState({}); // {stat_id: count}
  const [restSlots, setRestSlots] = React.useState(0);

  const usedSlots = Object.values(allocation).reduce((s,v)=>s+v,0) + restSlots;
  const remaining = TOTAL_SLOTS - usedSlots;

  function add(id, isRest=false){
    if(remaining <= 0) return;
    if(isRest) setRestSlots(r=>r+1);
    else setAllocation(a=>({...a,[id]:(a[id]||0)+1}));
  }
  function sub(id, isRest=false){
    if(isRest){ setRestSlots(r=>Math.max(0,r-1)); return; }
    setAllocation(a=>{const v=(a[id]||0)-1; if(v<=0){const n={...a};delete n[id];return n;} return {...a,[id]:v};});
  }

  const coachLv = getStaffLevel(staff,"coach");
  const prepLv  = getStaffLevel(staff,"prep");

  // Calcola gain stimato per un singolo slot (a una data stat)
  function estGain(opt, fromStat){
    const coachMult = coachLv && opt.stat ? coachLv.trainBonus : 1.0;
    const mid = (opt.gain[0]+opt.gain[1])/2 * coachMult;
    const curStat = fromStat!=null?fromStat:(opt.stat?(player.stats[opt.stat]||0):0);
    const dim = opt.stat ? Math.max(0.15,Math.pow(Math.max(0,(35-curStat)/35),0.6)) : 1.0;
    const coachLvNumE = coachLv?(coachLv.lv||1)-1:0;
    const coachCapE = {0:13,1:19,2:25,3:32}[coachLvNumE]||13;
    const capE = opt.stat?Math.max(0,Math.min(1,(coachCapE-curStat+3)/3)):1.0;
    return (mid*dim*capE).toFixed(2);
  }
  // Simula N slot cumulativi: ogni slot parte dalla stat aggiornata dal precedente
  function estStatAfter(opt, nSlots){
    if(!opt.stat||nSlots<=0) return null;
    const coachLvNum = coachLv?(coachLv.lv||1)-1:0;
    const coachCap = {0:13,1:19,2:25,3:32}[coachLvNum]||13;
    const coachMult = coachLv?coachLv.trainBonus:1.0;
    let s = parseFloat(player.stats[opt.stat]||0);
    for(let i=0;i<nSlots;i++){
      const dim=Math.max(0.15,Math.pow(Math.max(0,(35-s)/35),0.6));
      const cap=Math.max(0,Math.min(1,(coachCap-s+3)/3));
      const mid=(opt.gain[0]+opt.gain[1])/2*coachMult;
      s=Math.min(35,s+mid*dim*cap);
    }
    return s;
  }

  // Living cost blocco: 8 sett × lc_pausa
  function lc(rank){const base=rank>350?55:rank>300?75:rank>250?95:rank>200?120:rank>150?155:rank>100?200:rank>50?280:420;return Math.round(base*0.6);}
  const staffCostWeek = getStaffWeeklyCost(staff);
  const totalCostBlock = (lc(player.rank||500) + staffCostWeek) * WINTER_WEEKS;

  const canAfford = (player.money||0) >= totalCostBlock;

  // ── Calcolo LIVE fatica finale ─────────────────────────────
  const prepLvComp = getStaffLevel(staff,"prep");
  const prepMultComp = prepLvComp ? prepLvComp.fatigueReduce : 1.0;
  let liveFatDeltaTrain = 0;
  TRAIN.forEach(o=>{
    if(o.id==="rst") return;
    const count = allocation[o.id]||0;
    if(!count) return;
    const slotFat = o.fat>0 ? Math.round(o.fat*prepMultComp) : o.fat;
    liveFatDeltaTrain += slotFat * count;
  });
  const liveFatFinal = Math.max(0, Math.min(100,
    (player.fatigue||0) + liveFatDeltaTrain + restSlots*(-45) + (-64)
  ));
  const fatStart = player.fatigue||0;
  const fatDelta = Math.round(liveFatFinal) - fatStart;
  const fatCol = liveFatFinal>70?"#ef4444":liveFatFinal>40?"#f59e0b":"#10b981";
  const fatDeltaCol = fatDelta>0?"#ef4444":fatDelta<0?"#10b981":"#94a3b8";

  const filledColor = "#10b981";
  const emptyColor  = "#1e293b";

  return(
    <div style={{minHeight:"100vh",background:"#0f172a",color:"#fff",padding:16,maxWidth:500,margin:"0 auto",paddingBottom:40}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0c1a3a,#1e3a5f)",border:"1px solid #1e3a8a80",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:24}}>❄️</span>
          <div>
            <div style={{fontSize:17,fontWeight:900,letterSpacing:0.5,color:"#93c5fd"}}>BLOCCO INVERNALE</div>
            <div style={{fontSize:12,color:"#475569"}}>Settimane 42–49 · 8 settimane condensate</div>
          </div>
        </div>
        <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>
          Distribuisci i tuoi <span style={{color:"#f59e0b",fontWeight:700}}>{TOTAL_SLOTS} slot</span> di allenamento per tutta la pausa.
          Le settimane 50–51 le giocherai normalmente come pre-stagione.
        </div>
      </div>

      {/* Slot progress + fatica live — pannello unificato */}
      <div style={{background:"#0f2040",border:"1px solid #1e3a5f",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
        {/* Riga slot */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>Slot allocati</span>
          <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:900,color:remaining===0?"#10b981":remaining<6?"#f59e0b":"#fff"}}>
            {usedSlots}<span style={{color:"#475569",fontSize:14}}>/{TOTAL_SLOTS}</span>
          </span>
        </div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:10}}>
          {Array.from({length:TOTAL_SLOTS}).map((_,i)=>(
            <div key={i} style={{width:14,height:14,borderRadius:3,background:i<usedSlots?filledColor:emptyColor,border:"1px solid "+(i<usedSlots?"#10b981":"#334155"),transition:"background 0.15s"}}/>
          ))}
        </div>
        {/* Divider */}
        <div style={{borderTop:"1px solid #1e3a5f",marginBottom:10}}/>
        {/* Fatica live */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>🏃 Fatica a inizio stagione</span>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
            <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:900,color:fatCol}}>{Math.round(liveFatFinal)}%</span>
            {usedSlots>0&&<span style={{fontSize:12,fontWeight:700,color:fatDeltaCol}}>
              ({fatDelta>0?"+":""}{fatDelta}% vs ora)
            </span>}
          </div>
        </div>
        <div style={{height:8,background:"#0f172a",borderRadius:4,marginBottom:6}}>
          <div style={{height:"100%",width:`${liveFatFinal}%`,background:fatCol,borderRadius:4,transition:"width 0.2s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569"}}>
          <span>Attuale: {fatStart}%</span>
          <span>Allenamenti: {liveFatDeltaTrain>0?"+":""}{liveFatDeltaTrain}% · Riposo: {restSlots>0?"-"+(restSlots*45)+"%":"—"} · Pausa: −64%</span>
        </div>
        {remaining===0&&<div style={{fontSize:12,color:"#10b981",marginTop:8,fontWeight:700}}>✅ Tutti gli slot allocati — pronto per confermare</div>}
        {remaining>0&&<div style={{fontSize:12,color:"#94a3b8",marginTop:8}}>{remaining} slot rimanenti da assegnare</div>}
      </div>

      {/* Costo blocco */}
      <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid #ef444433",borderRadius:9,padding:"8px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,color:"#94a3b8"}}>💸 Costo totale blocco (8 sett)</span>
        <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:900,color:canAfford?"#ef4444":"#f87171"}}>
          −€{totalCostBlock.toLocaleString("it-IT")}
        </span>
      </div>
      {!canAfford&&<div style={{fontSize:12,color:"#fca5a5",background:"rgba(239,68,68,0.12)",borderRadius:8,padding:"7px 12px",marginBottom:12}}>
        ⚠️ Fondi insufficienti — potresti andare in debito. Puoi procedere comunque.
      </div>}

      {/* Opzioni allenamento */}
      <div style={{fontSize:12,color:"#64748b",fontWeight:700,marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Alloca slot per disciplina</div>
      <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:16}}>
        {ALL_OPTS.map(o=>{
          const isRest = o.id==="rst";
          const count = isRest ? restSlots : (allocation[o.id]||0);
          const est = isRest ? null : estGain(o);
          const fatEffect = isRest ? o.fat : o.fat;
          return(
            <div key={o.id} style={{background:count>0?"rgba(16,185,129,0.07)":"#111b2e",border:"1px solid "+(count>0?"#10b98133":"#1e293b"),borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20,minWidth:28,textAlign:"center"}}>{o.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{o.label}</div>
                {/* Stat corrente → prevista dopo gli slot allocati */}
                {!isRest&&o.stat&&(()=>{
                  const curS=parseFloat((player.stats[o.stat]||0).toFixed(2));
                  const afterS=count>0?estStatAfter(o,count):null;
                  return(
                    <div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:3,marginBottom:2}}>
                      <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:900,color:"#94a3b8"}}>{curS.toFixed(2)}</span>
                      {afterS!=null&&<>
                        <span style={{fontSize:12,color:"#334155"}}>→</span>
                        <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:900,color:"#10b981"}}>{afterS.toFixed(2)}</span>
                        <span style={{fontSize:11,color:"#10b981",fontWeight:700}}>(+{(afterS-curS).toFixed(2)})</span>
                      </>}
                    </div>
                  );
                })()}
                <div style={{fontSize:11,color:"#475569",marginTop:1}}>
                  {isRest
                    ? `Fatica ${o.fat}% · Morale +(${morale<30?5:morale<50?3:morale<65?2:morale<80?1:0})`
                    : `~+${estGain(o)}pt/slot · Fatica +${o.fat}%`
                  }
                  {coachLv&&!isRest&&o.stat&&<span style={{color:"#059669",marginLeft:4}}>· Coach ×{coachLv.trainBonus}</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>sub(o.id,isRest)} disabled={count===0}
                  style={{width:28,height:28,borderRadius:6,background:count>0?"#334155":"#1e293b",border:"none",color:count>0?"#fff":"#334155",fontSize:16,cursor:count>0?"pointer":"default",fontWeight:700}}>−</button>
                <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:900,color:count>0?"#10b981":"#475569",minWidth:22,textAlign:"center"}}>{count}</span>
                <button onClick={()=>add(o.id,isRest)} disabled={remaining===0}
                  style={{width:28,height:28,borderRadius:6,background:remaining>0?"#10b981":"#1e293b",border:"none",color:remaining>0?"#fff":"#334155",fontSize:16,cursor:remaining>0?"pointer":"default",fontWeight:700}}>+</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Riepilogo distribuito */}
      {usedSlots>0&&(
        <div style={{background:"#0f2040",border:"1px solid #1e3a5f",borderRadius:10,padding:"10px 14px",marginBottom:16}}>
          <div style={{fontSize:12,color:"#64748b",fontWeight:700,marginBottom:8,letterSpacing:0.5}}>RIEPILOGO PIANO</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {TRAIN_OPTS.filter(o=>(allocation[o.id]||0)>0).map(o=>(
              <div key={o.id} style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                <span style={{color:"#94a3b8"}}>{o.icon} {o.label}</span>
                <span style={{color:"#e2e8f0",fontWeight:700}}>{allocation[o.id]} slot · ~+{(estGain(o)*allocation[o.id]).toFixed(2)}pt totali</span>
              </div>
            ))}
            {restSlots>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
              <span style={{color:"#94a3b8"}}>😴 Riposo</span>
              <span style={{color:"#3b82f6",fontWeight:700}}>{restSlots} slot · fatica {restSlots*45}% recuperata</span>
            </div>}
          </div>
        </div>
      )}

      {/* Bottone conferma */}
      <button
        onClick={()=>remaining===0&&onConfirm({allocation, restSlots})}
        disabled={remaining>0}
        style={{
          width:"100%",padding:"14px 0",borderRadius:10,border:"none",
          background:remaining===0?"linear-gradient(90deg,#1d4ed8,#3b82f6)":"#1e293b",
          color:remaining===0?"#fff":"#475569",
          fontSize:15,fontWeight:900,cursor:remaining===0?"pointer":"default",
          letterSpacing:0.5,transition:"all 0.2s"
        }}>
        {remaining===0?"❄️ Conferma Pausa Invernale →":`Assegna ancora ${remaining} slot per continuare`}
      </button>
      <div style={{fontSize:11,color:"#334155",textAlign:"center",marginTop:8}}>
        Dopo la conferma riprenderai dalla settimana 50 (pre-stagione)
      </div>
    </div>
  );
}

function TrainingScreen({player,staff,onTrain,onFinish,trainCount,week,morale}){
  const[chosen,setChosen]=useState(null);
  const[lastMsg,setLastMsg]=useState(null);
  const fat=player.fatigue||0;
  const coachLv=getStaffLevel(staff,"coach");
  const sparringLv=getStaffLevel(staff,"sparring");
  const prepLv=getStaffLevel(staff,"prep");
  const physioLv=getStaffLevel(staff,"physio");
  const isPausa=week>=42&&week<=51;
  const slotsMax=isPausa?3:5;
  const slotsLeft=slotsMax-trainCount;
  const canDoStat=slotsLeft>0&&fat<95;
  const canRest=slotsLeft>0;
  const canTrain=canDoStat||canRest;

  const prevTrainCount=React.useRef(trainCount);
  React.useEffect(()=>{
    if(trainCount>prevTrainCount.current&&trainCount>=slotsMax){
      const t=setTimeout(()=>onFinish(),600);
      return()=>clearTimeout(t);
    }
    prevTrainCount.current=trainCount;
  },[trainCount,slotsMax,onFinish]);

  function doTrain(){
    if(!chosen||!canTrain)return;
    onTrain(chosen);
    setLastMsg(chosen.id==="rst"
      ? "😴 Riposo completato"
      : "✓ "+chosen.label+" — slot "+(trainCount+1)+"/"+slotsMax);
    setChosen(null);
  }

  return(
    <div style={{minHeight:"100vh",background:"#0f172a",color:"#fff",padding:16,maxWidth:500,margin:"0 auto",paddingBottom:32}}>
      {/* Header */}
      {isPausa&&<div style={{background:"rgba(30,58,138,0.3)",border:"1px solid #1e3a8a60",borderRadius:10,padding:"8px 14px",marginBottom:12,fontSize:13,color:"#93c5fd"}}>❄️ <strong>Pausa invernale</strong> — max 3 slot settimanali (recupero prioritario)</div>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <h2 style={{fontSize:18,fontWeight:"bold",margin:0}}>🏋️ Allenamento settimana</h2>
        <div style={{display:"flex",gap:4}}>
          {Array.from({length:slotsMax}).map((_,i)=>(
            <div key={i} style={{width:12,height:12,borderRadius:"50%",background:i<trainCount?"#10b981":"#334155",border:"1px solid "+(i<trainCount?"#10b981":"#475569")}}/>
          ))}
          <span style={{fontSize:13,color:slotsLeft>0?"#cbd5e1":"#94a3b8",marginLeft:4}}>{slotsLeft} slot rimanenti</span>
        </div>
      </div>
      {lastMsg&&(
        <div style={{background:"rgba(16,185,129,0.1)",border:"1px solid #10b98133",borderRadius:10,padding:"9px 14px",marginBottom:12,fontSize:13,color:"#10b981"}}>
          {lastMsg}{slotsLeft>0?" — puoi aggiungere un'altra sessione":""}
        </div>
      )}

      {/* Stato fisico */}
      <Card style={{marginBottom:14}}>
        <STitle>STATO FISICO</STitle>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
          <span>Stanchezza</span>
          <span style={{color:fat>70?"#ef4444":fat>40?"#f59e0b":"#10b981",fontWeight:"bold"}}>{fat}%</span>
        </div>
        <div style={{height:8,background:"#0f172a",borderRadius:4}}>
          <div style={{height:"100%",width:`${fat}%`,background:fat>70?"#ef4444":fat>40?"#f59e0b":"#10b981",borderRadius:4}}/>
        </div>
        {fat>=95&&<div style={{fontSize:13,color:"#fca5a5",marginTop:6}}>🚫 Stanchezza massima — nessuna sessione possibile</div>}
        {fat>70&&fat<95&&<div style={{fontSize:13,color:"#fbbf24",marginTop:6}}>⚠️ Alta stanchezza — prestazioni ridotte in gara</div>}
        <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:6}}>
          {coachLv&&<Badge label={"🎓 Coach "+coachLv.label+": +"+(Math.round((coachLv.trainBonus-1)*100))+"% gain"} color="#10b981"/>}
          {sparringLv&&<Badge label={"🎾 Sparring "+sparringLv.label+": +"+sparringLv.weeklyGain+"/sett"} color="#3b82f6"/>}
          {prepLv&&<Badge label={"💪 Prep "+prepLv.label+": -"+(Math.round((1-prepLv.fatigueReduce)*100))+"% fatica"} color="#8b5cf6"/>}
          {physioLv&&<Badge label={"🏥 Fisio "+physioLv.label+": jet lag -"+(Math.round(physioLv.jetLagReduce*100))+"% · rec +"+(physioLv.recoveryBonus)+"/sett"} color="#06b6d4"/>}
        </div>
      </Card>

      {/* Opzioni allenamento */}
      {canTrain?(
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {TRAIN.map(o=>{
            const isRest=o.id==="rst";
            const optEnabled=isRest?canRest:canDoStat;
            const sel=chosen?.id===o.id;
            const cur=o.stat?(player.stats[o.stat]||0):null;
            const coachMult=coachLv&&o.stat?coachLv.trainBonus:1.0;
            const prepMult=prepLv&&o.fat>0?prepLv.fatigueReduce:1.0;
            const dimFactor=o.stat?Math.max(0.15,Math.pow(Math.max(0,(35-(cur||0))/35),0.6)):1.0;
            const coachLvNumD=coachLv?(coachLv.lv||1)-1:0;
            const coachCapD={0:13,1:19,2:25,3:32}[coachLvNumD]||13;
            const isMentaleD=o.stat==="mentale";
            const isAtleD=o.stat==="velocita"||o.stat==="resistenza";
            const mentalLvD=getStaffLevel(staff,"mental");
            const prepLvCapD=getStaffLevel(staff,"prep");
            const coachCapD2=coachCapD+(isMentaleD&&mentalLvD?3:0)+(isAtleD&&prepLvCapD?2:0);
            const capFactorD=o.stat?Math.max(0,Math.min(1,(coachCapD2-(cur||0)+3)/3)):1.0;
            const gainLo=(o.gain[0]*coachMult*dimFactor*capFactorD).toFixed(2);
            const gainHi=(o.gain[1]*coachMult*dimFactor*capFactorD).toFixed(2);
            const fatDisplay=o.fat>0?Math.round(o.fat*prepMult):o.fat;
            return(
              <div key={o.id} onClick={()=>optEnabled&&setChosen(sel?null:o)}
                style={{background:sel?"rgba(245,158,11,0.12)":optEnabled?"#1e293b":"#111827",border:`1px solid ${sel?"#f59e0b":optEnabled?"#334155":"#1f2937"}`,borderRadius:10,padding:"10px 12px",cursor:optEnabled?"pointer":"not-allowed",opacity:optEnabled?1:0.45,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:22}}>{o.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"bold",fontSize:13}}>{o.label}</div>
                  <div style={{fontSize:12,color:"#94a3b8"}}>
                    {o.id==="rst"
                      ? `Recupera ${Math.abs(o.fat)}% stanchezza · Morale +(${morale<30?5:morale<50?3:morale<65?2:morale<80?1:0})`
                      : `+${gainLo}–${gainHi} pt · Fatica +${fatDisplay}%`}
                  </div>
                </div>
                {cur!==null&&<div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#94a3b8"}}>Ora</div>
                  <div style={{fontWeight:"bold",fontSize:13,color:getStatColor(cur)}}>{cur%1===0?cur:cur.toFixed(2)}</div>
                </div>}
              </div>
            );
          })}
        </div>
      ):(
        <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid #ef444433",borderRadius:10,padding:14,marginBottom:16,textAlign:"center",color:"#fca5a5",fontSize:13}}>
          {fat>=95?"🚫 Stanchezza massima — solo riposo disponibile (stat bloccate)":"✅ Hai usato tutti i slot settimanali"}
        </div>
      )}

      {/* Pulsante conferma sessione */}
      {canTrain&&(
        <button onClick={doTrain} disabled={!chosen}
          style={{width:"100%",background:chosen?`linear-gradient(90deg,${trainCount>0?"#3b82f6,#8b5cf6":"#f59e0b,#ef4444"})`:"#334155",border:"none",borderRadius:12,padding:13,color:"#fff",fontWeight:"bold",fontSize:14,cursor:chosen?"pointer":"default",marginBottom:10}}>
          {chosen?(trainCount>0?"➕ Aggiungi sessione: "+chosen.label:"💪 Conferma: "+chosen.label):"Seleziona un'opzione"}
        </button>
      )}

    </div>
  );
}

              <button onClick={()=>{

// NEWS FLASH SCREEN — interrupt a inizio settimana
// ═══════════════════════════════════════════════════
function NewsFlashScreen({evt,onDismiss}){
  if(!evt)return null;
  const CAT_COL={injury:"#ef4444",logistics:"#f97316",form:"#a855f7",positive:"#10b981",color:"#64748b"};
  const CAT_BG={injury:"rgba(239,68,68,0.08)",logistics:"rgba(249,115,22,0.08)",form:"rgba(168,85,247,0.08)",positive:"rgba(16,185,129,0.08)",color:"rgba(100,116,139,0.08)"};
  const CAT_LABEL={injury:"INFORTUNIO",logistics:"LOGISTICA",form:"FORMA",positive:"NOTIZIA",color:"ATTUALITÀ"};
  const col=CAT_COL[evt.cat]||CAT_COL.color;
  const bg=CAT_BG[evt.cat]||CAT_BG.color;
  const label=CAT_LABEL[evt.cat]||"EVENTO";
  const EVT_EFFECTS_LOCAL={
    inj_shoulder:{fatigueFloor:28,pStrPenalty:0.10,weeks:3},
    inj_knee:{fatigueFloor:25,pStrPenalty:0.08,weeks:2},
    inj_back:{fatigueFloor:30,pStrPenalty:0.12,weeks:2},
    inj_ankle:{fatigueFloor:22,pStrPenalty:0.07,weeks:2},
    inj_wrist:{fatigueFloor:20,pStrPenalty:0.09,weeks:3},
    inj_serious:{fatigueFloor:40,pStrPenalty:0.18,weeks:6,severe:true,blockTournaments:true},
    log_flight:{moneyCost:120,moraleDelta:-3,weeks:2,blockZoneChange:true},
    log_visa:{moneyCost:0,moraleDelta:-5,weeks:2,blockZoneChange:true},
    log_equipment:{moneyCost:200,pStrPenalty:0.05,weeks:1},
    log_fine:{moneyCost:250,moraleDelta:-4},
    log_illness:{fatigueFloor:35,pStrPenalty:0.10,weeks:2,blockTournaments:true},
    log_hotel:{moneyCost:100,moraleDelta:-3},
    form_slump:{moralePctDrop:0.20,moralePctCap:0.75,weeks:4},
    form_burnout:{fatigueFloor:42,trainGainPenalty:0.40,weeks:3},
    form_mental:{moralePctDrop:0.30,moralePctCap:0.65,moraleRecoveryHalf:true,weeks:5},
    form_tech:{statPenalty:true,weeks:4},
    form_doubt:{moralePctDrop:0.10,moralePctCap:0.85,archBonusHalf:true,weeks:2},
    pos_form:{pStrBonus:0.08,weeks:2},
    pos_sponsor_extra:{moneyCost:-300},
    pos_media:{moraleDelta:8},
    col_documentary:{ moraleDelta:14, tvBonus:true },
  };
  const fx=EVT_EFFECTS_LOCAL[evt.id]||{};
  // Costruisce lista effetti leggibili
  const effects=[];
  if(fx.pStrPenalty) effects.push({icon:"⚔️",txt:`Forza in campo −${Math.round(fx.pStrPenalty*100)}%`,neg:true});
  if(fx.pStrBonus)   effects.push({icon:"⚔️",txt:`Forza in campo +${Math.round(fx.pStrBonus*100)}%`,neg:false});
  if(fx.moneyCost&&fx.moneyCost>0) effects.push({icon:"💸",txt:`−€${fx.moneyCost.toLocaleString("it-IT")} dal budget`,neg:true});
  if(fx.moneyCost&&fx.moneyCost<0) effects.push({icon:"💰",txt:`+€${Math.abs(fx.moneyCost).toLocaleString("it-IT")} al budget`,neg:false});
  if(fx.moraleDelta&&fx.moraleDelta<0) effects.push({icon:"😔",txt:`Morale ${fx.moraleDelta}`,neg:true});
  if(fx.moraleDelta&&fx.moraleDelta>0) effects.push({icon:"😊",txt:`Morale +${fx.moraleDelta}`,neg:false});
  if(fx.fatigueFloor) effects.push({icon:"🏃",txt:`Fatica non scende sotto ${fx.fatigueFloor}%`,neg:true});
  if(fx.moraleCap) effects.push({icon:"🧠",txt:`Morale bloccato ≤ ${fx.moraleCap}`,neg:true});

  );
}

function CharCreation({onStart,hasSave,onResume,onImport}){
  const importRef=React.useRef(null);
  const nameRef=React.useRef(null);
  const[step,setStep]=useState("arch");
  const[gameMode,setGameMode]=useState("classic");
  const[showNameHint,setShowNameHint]=useState(false);
  const[name,setName]=useState("");
  const[nat,setNat]=useState("ITA");
  const[arch,setArch]=useState(null);
  const[startAge,setStartAge]=useState(17);
  const[stats,setStats]=useState({});

  // Bonus stat e budget per età di inizio carriera
  // Ogni anno in più rispetto a 15 = +1.5 punti stat extra distribuiti + budget maggiore
  const AGE_PROFILES={
    15:{label:"Talento Precoce",   icon:"🌱", pool:35, budget:1800, startPts:0,
        desc:"Partirai da zero, senza esperienza né soldi. Ogni punto ATP sarà sudata conquista. La carriera più lunga e più difficile."},
    16:{label:"Giovane Promessa",  icon:"🌿", pool:42, budget:2400, startPts:12,
        desc:"Qualche mese in più di allenamento prima del debutto. Inizio ancora duro, ma con un piccolo vantaggio tecnico."},
    17:{label:"Esordiente",        icon:"⚡", pool:50, budget:3200, startPts:26,
        desc:"Il punto di equilibrio classico. Buona tecnica di base, tempo ancora dalla tua parte."},
    18:{label:"Profilo Standard",  icon:"🎾", pool:55, budget:4000, startPts:40,
        desc:"Arrivi con esperienza formativa. Stat solide, un po' di liquidità in più. Meno anni in cima, ma partirai forte."},
    19:{label:"Carriera Avviata",  icon:"🔥", pool:60, budget:5000, startPts:81,
        desc:"Hai già fatto la trafila minore. Stat migliori, buon budget di partenza. Finestra di carriera più corta — ogni anno conta doppio."},
  };

  // Scala le stat base dell'archetipo al pool totale dell'età
  // Mantiene le proporzioni relative, rispetta cap 35 e min 1
  function scaleStatsToPool(baseStats, targetPool){
    const keys=Object.keys(baseStats);
    const baseTotal=Object.values(baseStats).reduce((a,b)=>a+b,0);
    const scale=targetPool/baseTotal;
    let result={};
    keys.forEach(k=>{result[k]=Math.max(1,Math.min(35,Math.round(baseStats[k]*scale)));});
    // Aggiusta rounding per colpire esattamente il pool
    let cur=Object.values(result).reduce((a,b)=>a+b,0);
    const sorted=[...keys].sort((a,b)=>baseStats[b]-baseStats[a]);
    while(cur<targetPool){
      for(const k of sorted){if(result[k]<35){result[k]++;cur++;break;}}
    }
    while(cur>targetPool){
      for(const k of [...sorted].reverse()){if(result[k]>1){result[k]--;cur--;break;}}
    }
    return result;
  }

  const profile=AGE_PROFILES[startAge]||AGE_PROFILES[17];
  const statPool=profile.pool||50;
  const baseStats=arch?arch.s:{};
  const baseStats17=arch?arch.s:{};  // archetipo sempre in pool 50 (17 anni)
  const used=Object.values(stats).reduce((a,b)=>a+b,0);
  const rem=statPool-used;
  const ok=name.trim().length>1&&arch&&rem===0;

  function pick(a){
    setArch(a);
    setStats(scaleStatsToPool({...a.s},statPool));
  }
  function adj(s,d){
    const nv=(stats[s]||0)+d;
    if(nv<1||nv>35)return;
    if(d>0&&rem<=0)return;
    setStats(p=>({...p,[s]:nv}));
  }
  // Quando cambia l'età, riscala le stat al nuovo pool
  function pickAge(age){
    setStartAge(age);
    if(arch){
      const newProfile=AGE_PROFILES[age]||AGE_PROFILES[17];
      setStats(scaleStatsToPool({...arch.s},newProfile.pool||50));
    }
  }

  if(step==="arch")return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e1b4b)",color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{fontSize:56,marginBottom:4}}>🎾</div>
      <h1 style={{fontSize:28,fontWeight:900,letterSpacing:2,margin:"0 0 4px",background:"linear-gradient(90deg,#f59e0b,#ef4444)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ATP CAREER</h1>
      <p style={{color:"#64748b",marginBottom:24,fontSize:13}}>Scala il ranking mondiale. Diventa il N°1.</p>
      <Card style={{width:"100%",maxWidth:480,marginBottom:16,border:"1px solid #334155"}}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>{setShowNameHint(true);setTimeout(()=>{nameRef.current?.scrollIntoView({behavior:"smooth",block:"center"});nameRef.current?.focus();},150);setTimeout(()=>setShowNameHint(false),4000);}}
            style={{width:"100%",background:"linear-gradient(90deg,#f59e0b,#ef4444)",border:"none",borderRadius:10,padding:"14px 0",color:"#fff",fontWeight:900,fontSize:16,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 16px rgba(245,158,11,0.3)"}}>
            🎾 Nuova Carriera
          </button>
          {hasSave&&(
            <button onClick={onResume}
              style={{width:"100%",background:"#10b981",border:"none",borderRadius:8,padding:"11px 0",color:"#fff",fontWeight:"bold",cursor:"pointer",fontSize:14}}>
              ▶ Riprendi partita corrente
            </button>
          )}
          <button onClick={()=>importRef.current?.click()}
            style={{width:"100%",background:"rgba(59,130,246,0.12)",border:"1px solid #3b82f633",borderRadius:8,padding:"10px 0",color:"#3b82f6",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            📥 Importa salvataggio
          </button>
          <input ref={importRef} type="file" accept=".json" style={{display:"none"}}
            onChange={e=>{if(e.target.files[0])onImport(e.target.files[0]);}}/>
        </div>
      </Card>
      <Card style={{width:"100%",maxWidth:480,marginBottom:16}}>
        {showNameHint&&(
          <div style={{background:"#f59e0b",color:"#000",fontWeight:800,fontSize:13,padding:"8px 14px",borderRadius:8,marginBottom:10,textAlign:"center",animation:"pulse 1s ease-in-out infinite",position:"relative"}}>
            👇 Inserisci il tuo nome (N. Cognome) per iniziare!
            <div style={{position:"absolute",bottom:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"6px solid transparent",borderRight:"6px solid transparent",borderTop:"6px solid #f59e0b"}}/>
          </div>
        )}
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <input ref={nameRef} value={name} onChange={e=>{setName(e.target.value);if(showNameHint)setShowNameHint(false);}} placeholder="Nome (es. M. Rossi)" style={{flex:1,background:"#0f172a",border:`1px solid ${showNameHint?"#f59e0b":"#334155"}`,borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:14,outline:"none",transition:"border 0.3s"}}/>
          <select value={nat} onChange={e=>setNat(e.target.value)} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"9px 8px",color:"#fff",fontSize:12,outline:"none"}}>
            {NATS.map(n=><option key={n.c} value={n.c}>{n.f} {n.n}</option>)}
          </select>
        </div>

        {/* Selezione età inizio carriera */}
        <STitle>ETÀ DI INIZIO CARRIERA</STitle>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {[15,16,17,18,19].map(age=>{
            const ap=AGE_PROFILES[age];
            const sel=startAge===age;
            return(
              <div key={age} onClick={()=>pickAge(age)}
                style={{flex:1,padding:"8px 4px",borderRadius:10,border:`2px solid ${sel?"#f59e0b":"#1e293b"}`,
                  background:sel?"rgba(245,158,11,0.10)":"#0f172a",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
                <div style={{fontSize:16,marginBottom:2}}>{ap.icon}</div>
                <div style={{fontSize:17,fontWeight:900,color:sel?"#f59e0b":"#cbd5e1",fontFamily:"'Rajdhani',sans-serif"}}>{age}</div>
                <div style={{fontSize:9,color:sel?"#f59e0b":"#4e6680",fontWeight:700,lineHeight:1.2}}>{ap.label}</div>
              </div>
            );
          })}
        </div>
        {/* Descrizione profilo selezionato */}
        <div style={{fontSize:12,color:"#94a3b8",background:"rgba(255,255,255,0.03)",border:"1px solid #1e293b",borderRadius:8,padding:"8px 12px",marginBottom:16,lineHeight:1.5}}>
          <span style={{color:"#f59e0b",fontWeight:700}}>{profile.icon} {profile.label}</span>
          {" — "}{profile.desc}
          <div style={{marginTop:6,display:"flex",gap:10,fontSize:11,flexWrap:"wrap"}}>

// Returns round name based on round index and total rounds
function getRoundName(roundIdx, totalRounds){
  const fromEnd = totalRounds - 1 - roundIdx;
  if(fromEnd===0)return "Finale";
  if(fromEnd===1)return "Semifinale";
  if(fromEnd===2)return "Quarti di Finale";
  if(fromEnd===3)return "Ottavi di Finale";
  if(fromEnd===4)return "Sedicesimi di Finale";
  return "Turno " + (roundIdx+1);
}

// CITY TRANSITION HUD — overlay cinematico viaggio
// ═══════════════════════════════════════════════════
function CityTransitionHUD({data,onSkip}){
  const{level,fromCity,fromFlag,fromZone,toCity,toFlag,toZone,
        tourName,tierColor,tierLabel,surface,accom,duration}=data;

  const[phase,setPhase]=React.useState("travel"); // "travel" | "arrive"
  const[accomVisible,setAccomVisible]=React.useState(false);
  const timerRef=React.useRef(null);

  React.useEffect(()=>{
    // Fase 1: viaggio
    const arriveAt=Math.round(duration*0.72);
    const accomAt=Math.round(duration*0.85);
    const t1=setTimeout(()=>setPhase("arrive"),arriveAt);
    const t2=setTimeout(()=>setAccomVisible(true),accomAt);
    timerRef.current=[t1,t2];
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[duration]);

  function skip(){
    if(timerRef.current) timerRef.current.forEach(clearTimeout);
    onSkip();
  }

  // Metodo di trasporto per livello
  const VEHICLE_CFG=[
    null,
    {icon:"🚗",label:"In auto",line:"━━━",color:"#10b981",shake:true},
    {icon:"🚂",label:"In treno",line:"━━━━━",color:"#3b82f6",shake:true},
    {icon:"✈",label:"Volo + transfer",line:"╌╌╌╌╌╌╌",color:"#8b5cf6",shake:false},
    {icon:"✈",label:"Volo intercontinentale",line:"╌╌╌╌╌╌╌╌╌╌╌",color:"#f59e0b",shake:false},
  ];
  const vc=VEHICLE_CFG[level]||VEHICLE_CFG[3];
  const animDur=`${duration*0.68}ms`;
  const zoneColor={"Europa":"#3b82f6","Americas":"#10b981","Asia-Pacifico":"#f59e0b","Africa-MO":"#ef4444"};
  const fromCol=zoneColor[fromZone]||"#64748b";
  const toCol=zoneColor[toZone]||tierColor||"#64748b";

  // Label secondaria per intercontinentale
  const subLabel=level===4?"Lungo raggio · ~12-14h":level===3?"Cambio continente · ~4-8h":level===2?"Viaggio internazionale":level===1?"Spostamento locale":"";

  return(
    <div onClick={skip} style={{position:"fixed",inset:0,zIndex:1000,background:"#050c18",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      padding:"24px 20px",cursor:"pointer",userSelect:"none"}}>

      {/* Tier badge in alto */}
      <div style={{position:"absolute",top:20,left:0,right:0,display:"flex",justifyContent:"center"}}>
        <div style={{background:`${tierColor}22`,border:`1px solid ${tierColor}55`,borderRadius:20,
          padding:"4px 16px",fontSize:12,fontWeight:800,color:tierColor,letterSpacing:2,textTransform:"uppercase"}}>
          {tierLabel} · {surface}
        </div>
      </div>

      {/* Partenza */}
      <div style={{textAlign:"center",marginBottom:28,animation:"trv-fadein 0.5s ease"}}>
        <div style={{fontSize:28,marginBottom:4}}>{fromFlag||"🌍"}</div>
        <div style={{fontSize:13,color:"#475569",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Partenza</div>
        <div style={{fontSize:32,fontWeight:900,color:"#94a3b8",fontFamily:"'Rajdhani',sans-serif",letterSpacing:1}}>{fromCity}</div>
        <div style={{fontSize:12,color:fromCol,fontWeight:600,marginTop:2}}>{fromZone}</div>
      </div>

      {/* Linea di trasporto animata */}
      <div style={{position:"relative",width:"100%",maxWidth:300,height:54,marginBottom:28}}>
        {/* Linea tratteggiata di sfondo */}
        <div style={{position:"absolute",top:"50%",left:"4%",right:"4%",height:2,
          background:`repeating-linear-gradient(90deg,${vc.color}55 0,${vc.color}55 8px,transparent 8px,transparent 16px)`,
          transform:"translateY(-50%)"}}/>
        {/* Veicolo animato */}
        <div style={{position:"absolute",top:"50%",transform:"translateY(-50%)",
          fontSize:level>=3?26:22,
          animation:`trv-vehicle ${animDur} linear forwards${vc.shake?", trv-shake 0.4s ease-in-out infinite":""}`}}>
          {vc.icon}
        </div>
        {/* Label mezzo sotto la linea */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,textAlign:"center",
          fontSize:11,color:vc.color,fontWeight:700,letterSpacing:1}}>
          {vc.label}{subLabel?` · ${subLabel}`:""}
        </div>
      </div>

      {/* Destinazione */}
      <div style={{textAlign:"center",marginBottom:32,
        opacity:phase==="arrive"?1:0,
        transform:phase==="arrive"?"translateY(0)":"translateY(14px)",
        transition:"opacity 0.5s ease, transform 0.5s ease"}}>
        <div style={{fontSize:13,color:"#475569",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Destinazione</div>
        <div style={{fontSize:42,fontWeight:900,color:"#f0f6ff",fontFamily:"'Rajdhani',sans-serif",
          letterSpacing:1,textShadow:`0 0 30px ${toCol}66`}}>{toCity}</div>
        <div style={{fontSize:14,marginTop:4}}>{toFlag} <span style={{color:toCol,fontWeight:700,fontSize:13}}>{toZone}</span></div>
        <div style={{fontSize:15,color:"#64748b",fontWeight:600,marginTop:6}}>{tourName}</div>
      </div>

      {/* Badge alloggio — appare alla fine */}
      {accomVisible&&(
        <div style={{animation:"trv-accom 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards",
          background:`${tierColor}18`,border:`1.5px solid ${tierColor}55`,
          borderRadius:16,padding:"12px 24px",textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:30,marginBottom:4}}>{accom.icon}</div>
          <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0"}}>{accom.label}</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{toCity}</div>
        </div>
      )}

      {/* Skip hint */}
      <div style={{position:"absolute",bottom:18,fontSize:11,color:"#1e3a5f",fontWeight:600,letterSpacing:1}}>
        Tocca per saltare
      </div>
    </div>
  );
}
